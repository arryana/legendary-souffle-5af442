<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- glass vessel: teardrop top, tube body, rounded base -->
  <path d="M16 2.5 Q 12.4 7 12 10.5 L12 23.5 a4 4 0 0 0 8 0 L20 10.5 Q 19.6 7 16 2.5 Z"
        fill="#0f0b07" stroke="#c9974e" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- base disc -->
  <ellipse cx="16" cy="29" rx="5.4" ry="1.5" fill="none" stroke="#c9974e" stroke-width="1.5"/>
  <line x1="16" y1="27.4" x2="16" y2="28.3" stroke="#c9974e" stroke-width="1.5"/>
  <!-- floating bulbs -->
  <circle cx="16" cy="12" r="2" fill="#e04a3a"/>
  <circle cx="16" cy="17" r="2" fill="#e0952f"/>
  <circle cx="16" cy="22" r="2" fill="#3a78d6"/>
  <!-- glass highlight -->
  <path d="M13.6 9 Q 13.2 15 13.6 22" fill="none" stroke="#f2e9d8" stroke-width="0.9" opacity="0.5" stroke-linecap="round"/>
</svg>
