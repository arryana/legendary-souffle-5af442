<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>gyre — sagne</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root{ --bg1:#0f1420; --bg2:#1c2433; --brass:#c9974e; --parchment:#f2e9d8; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ height:100%; margin:0; overflow:hidden;
    background: radial-gradient(ellipse at 50% 40%, var(--bg2) 0%, var(--bg1) 80%);
    font-family: Georgia, serif; color:var(--parchment); }
  #backlink{ position:fixed; top:18px; left:22px; z-index:50; color:var(--parchment); opacity:.5; text-decoration:none; font-size:14px; letter-spacing:.04em; text-shadow:0 1px 3px rgba(0,0,0,.85), 0 0 9px rgba(0,0,0,.55); transition:opacity .3s ease; }
  #backlink:hover{opacity:.9;}
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  #dock{ position:fixed; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:16px;
    padding:14px 18px 24px; background:linear-gradient(to top, rgba(10,13,20,.9), rgba(10,13,20,0)); z-index:40; }
  .toggle{ display:flex; align-items:center; gap:8px; cursor:pointer; }
  .toggle input{ appearance:none; -webkit-appearance:none; width:40px; height:22px; border-radius:11px; background:rgba(242,233,216,.2); position:relative; cursor:pointer; transition:background .25s; outline:none; }
  .toggle input:checked{ background:rgba(201,151,78,.55); }
  .toggle input::after{ content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:var(--parchment); transition:left .22s; }
  .toggle input:checked::after{ left:20px; background:#fff2d8; }
  .glyph{ font-size:15px; opacity:.85; }
  .divider{ width:1px; height:24px; background:rgba(242,233,216,.2); }
  #speedRow{ display:flex; align-items:center; gap:10px; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:160px; height:3px; border-radius:3px; background:rgba(242,233,216,.25); outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--brass); cursor:pointer; box-shadow:0 0 6px rgba(201,151,78,.6); }
</style>
</head>
<body>
<a id="backlink" href="index.html">← sagne</a>
<!-- bring-your-own-music: plays a file the visitor picks from their own device; nothing is uploaded -->
<style>
  #music{ position:fixed; left:18px; bottom:16px; z-index:60; display:flex; align-items:center; gap:9px; }
  #musicBtn{ width:34px; height:34px; border-radius:50%; border:1px solid rgba(242,233,216,.25); background:rgba(20,24,34,.55); color:#f2e9d8; font-size:15px; line-height:1; cursor:pointer; opacity:.55; transition:opacity .3s, color .3s, border-color .3s; -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); }
  #musicBtn:hover{ opacity:1; }
  #musicBtn.playing{ color:#f0d69a; border-color:rgba(201,151,78,.6); opacity:.9; }
  #musicName{ max-width:40vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12px; color:#f2e9d8; opacity:0; transition:opacity .3s; letter-spacing:.02em; cursor:pointer; }
  #music:hover #musicName{ opacity:.55; }
</style>
<div id="music" title="play your own music">
  <button id="musicBtn" aria-label="play your own music">♪</button>
  <span id="musicName"></span>
</div>
<input type="file" id="musicPick" accept="audio/*" multiple hidden>
<audio id="musicEl"></audio>
<script>
(function(){
  const pick=document.getElementById('musicPick'), el=document.getElementById('musicEl'),
        btn=document.getElementById('musicBtn'), name=document.getElementById('musicName');
  let list=[], idx=0;
  const label=f=> f ? f.name.replace(/\.[^.]+$/,'') : '';
  function load(i){ if(el.src) URL.revokeObjectURL(el.src); el.src=URL.createObjectURL(list[i]); name.textContent=label(list[i]); }
  function sync(){ btn.textContent = !el.src ? '♪' : (el.paused ? '▶' : '❚❚'); btn.classList.toggle('playing', !!el.src && !el.paused); }
  btn.addEventListener('click', ()=>{ if(!list.length){ pick.click(); return; } el.paused ? el.play() : el.pause(); });
  name.addEventListener('click', ()=> pick.click());
  pick.addEventListener('change', ()=>{ if(!pick.files.length) return; list=[...pick.files]; idx=0; el.loop=(list.length===1); load(0); el.play(); });
  el.addEventListener('ended', ()=>{ if(list.length>1){ idx=(idx+1)%list.length; load(idx); el.play(); } });
  el.addEventListener('play', sync); el.addEventListener('pause', sync); el.addEventListener('loadeddata', sync);
  sync();
})();
</script>
<canvas id="scene"></canvas>
<div id="dock">
  <label class="toggle" title="run"><span class="glyph">⚙</span><input type="checkbox" id="runChk" checked></label>
  <div class="divider"></div>
  <div id="speedRow"><span class="glyph">🐢</span><input type="range" id="speedSlider" min="0" max="100" value="42"><span class="glyph">🐇</span></div>
</div>
<script>
(function(){
  const canvas=document.getElementById('scene'), ctx=canvas.getContext('2d');
  const runChk=document.getElementById('runChk'), speedSlider=document.getElementById('speedSlider');
  let W=0,H=0,DPR=1;

  const MODULE=5.4, ADD=MODULE, DED=1.25*MODULE;
  const pitchR=N=>MODULE*N/2, outerR=N=>pitchR(N)+ADD;
  const MESH_TOL=7;      // teeth engage within this of the exact centre distance
  const SNAP_TOL=18;     // on drop, if this close to a valid mesh, nudge to exact distance

  let gears=[], idc=0;
  const mk=(N,x,y,fixed)=>({id:idc++,N,x,y,angle:0,fixed:!!fixed});

  const TRAY=[8,12,16,22,30,40];
  let trayRects=[];
  function layoutTray(){
    const n=TRAY.length, slot=Math.min(70,(W*0.82)/n), x0=W/2-(n*slot)/2, y=92;
    trayRects=TRAY.map((N,i)=>({N,cx:x0+slot*i+slot/2,cy:y,hit:slot*0.42}));
  }
  let inited=false;
  function initGears(){
    if(inited) return; inited=true;
    const cx=W*0.5, cy=H*0.5;
    const D=mk(20,cx,cy,true);           // driver
    const B=mk(12,cx+(pitchR(20)+pitchR(12)),cy,false);                                        // right
    const C=mk(30,cx-(pitchR(20)+pitchR(30))*0.5, cy+(pitchR(20)+pitchR(30))*0.866, false);    // lower-left
    const E=mk(16,cx, cy-(pitchR(20)+pitchR(16)), false);                                      // top
    gears=[D,B,C,E];
  }
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=window.innerWidth; H=window.innerHeight;
    canvas.width=W*DPR; canvas.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
    layoutTray(); initGears();
  }
  window.addEventListener('resize',resize);

  // ---- gear shape (drawn at current transform origin) ----
  // wornTooth: index of a tooth to render slightly nicked/rounded, for individual character
  function gearOutline(c, N, wornTooth){
    const R=pitchR(N), Ra=R+ADD, Rd=R-DED, pitch=2*Math.PI/N, tRoot=pitch*0.30, tTip=pitch*0.17;
    c.beginPath();
    for(let k=0;k<N;k++){ const a=k*pitch;
      const worn = k===wornTooth;
      const RaK = worn ? Ra - ADD*0.55 : Ra;      // this one tooth sits a little short — a real chip
      const L=(r,g)=>c.lineTo(r*Math.cos(g),r*Math.sin(g));
      if(k===0) c.moveTo(Rd*Math.cos(a-pitch*0.5),Rd*Math.sin(a-pitch*0.5));
      L(Rd,a-tRoot); L(RaK,a-tTip*(worn?0.5:1)); L(RaK,a+tTip*(worn?0.5:1)); L(Rd,a+tRoot); L(Rd,a+pitch*0.5); }
    c.closePath();
  }
  // plain, unmarked body — used for the tray's catalogue icons (stock parts, not yet "real")
  function gearBody(N, driver, dim){
    const R=pitchR(N);
    gearOutline(ctx, N);
    const grad=ctx.createRadialGradient(-R*0.32,-R*0.32,R*0.12,0,0,R+ADD);
    if(dim){ grad.addColorStop(0,'#8f7c56'); grad.addColorStop(0.5,'#7a6338'); grad.addColorStop(1,'#4f3f22'); }
    else   { grad.addColorStop(0,'#eccd8f'); grad.addColorStop(0.45,'#c9974e'); grad.addColorStop(1,'#87672f'); }
    ctx.fillStyle=grad; ctx.fill();
    ctx.lineWidth=1.3; ctx.strokeStyle='rgba(55,38,14,0.65)'; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,R-DED-3,0,7); ctx.lineWidth=2; ctx.strokeStyle='rgba(80,55,22,0.4)'; ctx.stroke();
    if(N>=15){ const hn=Math.min(6,Math.floor(N/4)), hr=(R-DED)*0.55, hrad=R*0.13;
      for(let i=0;i<hn;i++){ const ha=i/hn*2*Math.PI; ctx.beginPath(); ctx.arc(hr*Math.cos(ha),hr*Math.sin(ha),hrad,0,7);
        ctx.fillStyle='#241b12'; ctx.fill(); ctx.lineWidth=1; ctx.strokeStyle='rgba(90,62,26,0.45)'; ctx.stroke(); } }
    ctx.beginPath(); ctx.arc(0,0,R*0.24,0,7); ctx.fillStyle=dim?'#7a5c30':'#bd8f48'; ctx.fill(); ctx.lineWidth=1.1; ctx.strokeStyle='rgba(55,38,14,0.6)'; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,R*0.10,0,7); ctx.fillStyle='#20170f'; ctx.fill();
    if(driver){ ctx.beginPath(); ctx.arc(R*0.42,0,R*0.11,0,7); ctx.fillStyle='#e7d7a8'; ctx.fill(); ctx.strokeStyle='rgba(55,38,14,0.6)'; ctx.stroke(); }
  }

  // ---- individual character: once a gear is placed it becomes a specific object, not a
  // stock shape — a seeded PRNG (from its own id) gives it a fixed, never-changing set of
  // small oddities: a lathe-turned brushed surface, a nicked tooth, a scratch, a patina spot,
  // a polish-worn ring round the bore. Rendered once to an offscreen sprite and cached, so it
  // costs nothing extra per frame and never flickers/regenerates.
  function mulberry32(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  const spriteCache=new Map();
  function buildGearSprite(N, driver, seed){
    const R=pitchR(N), Ra=R+ADD, size=Math.ceil((Ra+4)*2)*2;   // 2x for a crisper texture
    const off=document.createElement('canvas'); off.width=size; off.height=size;
    const c=off.getContext('2d'); c.translate(size/2,size/2); c.scale(2,2);
    const rnd=mulberry32(seed*2654435761>>>0);
    const wornTooth = rnd()<0.8 ? Math.floor(rnd()*N) : -1;   // most gears carry one small chip; a few don't

    const LX=-0.72, LY=-0.68;   // shared light direction — upper-left — for every directional effect below

    gearOutline(c, N, wornTooth);
    const grad=c.createRadialGradient(R*LX*0.35,R*LY*0.35,R*0.10,0,0,Ra);
    grad.addColorStop(0,'#fbe6ae'); grad.addColorStop(0.32,'#e6bb6e'); grad.addColorStop(0.68,'#b4813c'); grad.addColorStop(1,'#6e4d20');
    c.fillStyle=grad; c.fill();

    // per-tooth relief: each tooth catches the light on its own — the ones facing the lamp
    // read bright, the ones facing away sit in real shadow, rather than one smooth wash
    // across the whole face. This is the single biggest thing separating a flat painted
    // disc from something with actual dimension.
    c.save(); gearOutline(c, N, wornTooth); c.clip();
    { const pitch=2*Math.PI/N, tRoot=pitch*0.30, tTip=pitch*0.17, Rd0=R-DED;
      for(let k=0;k<N;k++){ const a=k*pitch, dx=Math.cos(a), dy=Math.sin(a);
        const lit=Math.max(0,dx*LX+dy*LY), shade=Math.max(0,-(dx*LX+dy*LY));
        if(lit<0.05 && shade<0.05) continue;
        c.beginPath();
        c.moveTo(Rd0*Math.cos(a-tRoot),Rd0*Math.sin(a-tRoot));
        c.lineTo(Ra*Math.cos(a-tTip),Ra*Math.sin(a-tTip));
        c.lineTo(Ra*Math.cos(a+tTip),Ra*Math.sin(a+tTip));
        c.lineTo(Rd0*Math.cos(a+tRoot),Rd0*Math.sin(a+tRoot));
        c.closePath();
        c.fillStyle = lit>shade ? `rgba(255,244,212,${lit*0.30})` : `rgba(25,15,5,${shade*0.34})`;
        c.fill();
      }
    }
    c.restore();

    // lathe-turned brushed texture: concentric tool marks, irregular in spacing/strength —
    // a machined surface, not a painted-smooth one
    c.save(); gearOutline(c, N, wornTooth); c.clip();
    const Rd=R-DED, rings=36+Math.floor(rnd()*14);
    for(let i=0;i<rings;i++){
      if(rnd()<0.22) continue;                               // gaps, so it doesn't read as a perfect target
      const rr=Rd*0.12 + (Ra-Rd*0.12)*(i/rings) + (rnd()-0.5)*1.4;
      c.beginPath(); c.arc(0,0,rr,0,7);
      c.lineWidth=0.5+rnd()*0.9;
      c.strokeStyle = rnd()<0.5 ? `rgba(255,238,200,${0.05+rnd()*0.07})` : `rgba(40,26,10,${0.05+rnd()*0.08})`;
      c.stroke();
    }
    // fine speckle — pitting and tiny highlights in the metal
    const speckN=Math.floor(R*2.2);
    for(let i=0;i<speckN;i++){
      const rr=Rd*Math.sqrt(rnd())*0.97, aa=rnd()*7;
      const x=rr*Math.cos(aa), y=rr*Math.sin(aa);
      c.beginPath(); c.arc(x,y,0.4+rnd()*0.7,0,7);
      c.fillStyle = rnd()<0.6 ? `rgba(30,20,8,${0.10+rnd()*0.10})` : `rgba(255,244,214,${0.10+rnd()*0.10})`;
      c.fill();
    }
    // one or two faint scratches — a real straight-line mark, not a smudge
    const nScratch = rnd()<0.7 ? 1 : 2;
    for(let s=0;s<nScratch;s++){
      const aa=rnd()*7, len=Rd*(0.35+rnd()*0.5), cx=(rnd()-0.5)*Rd*0.7, cy=(rnd()-0.5)*Rd*0.7;
      c.beginPath(); c.moveTo(cx-Math.cos(aa)*len/2, cy-Math.sin(aa)*len/2); c.lineTo(cx+Math.cos(aa)*len/2, cy+Math.sin(aa)*len/2);
      c.lineWidth=0.6+rnd()*0.5; c.strokeStyle=`rgba(${rnd()<0.5?'20,13,5':'255,240,210'},${0.14+rnd()*0.12})`;
      c.stroke();
    }
    // a patina/stain blotch — faint, irregular, never centred; sometimes a rust-toned streak
    // near the rim rather than a soft green blob, closer to how real brass actually stains
    if(rnd()<0.85){
      const rusty = rnd()<0.45;
      if(rusty){
        const aa=rnd()*7, rr=Rd*(0.55+rnd()*0.4), bx=rr*Math.cos(aa), by=rr*Math.sin(aa);
        const bg=c.createRadialGradient(bx,by,0,bx,by,R*(0.16+rnd()*0.16));
        bg.addColorStop(0,'rgba(120,58,26,0.16)'); bg.addColorStop(1,'rgba(120,58,26,0)');
        c.fillStyle=bg; c.beginPath(); c.arc(bx,by,R*0.3,0,7); c.fill();
      } else {
        const bx=(rnd()-0.5)*Rd*1.1, by=(rnd()-0.5)*Rd*1.1, br=R*(0.22+rnd()*0.28);
        const bg=c.createRadialGradient(bx,by,0,bx,by,br);
        bg.addColorStop(0, rnd()<0.5?'rgba(70,90,55,0.10)':'rgba(35,22,9,0.13)');
        bg.addColorStop(1, 'rgba(0,0,0,0)');
        c.fillStyle=bg; c.beginPath(); c.arc(bx,by,br,0,7); c.fill();
      }
    }
    // a bright rim where the edge catches the light, and a dark one on the side facing away —
    // real edge thickness rather than a flat disc — clipped to the toothed silhouette so
    // neither ever bleeds past it
    const rimAng=Math.atan2(LY,LX);
    c.beginPath(); c.arc(0,0,Ra-0.8,rimAng-1.1,rimAng+1.1); c.lineWidth=1.3; c.strokeStyle='rgba(255,241,210,0.4)'; c.stroke();
    c.beginPath(); c.arc(0,0,Ra-0.6,rimAng+Math.PI-1.0,rimAng+Math.PI+1.0); c.lineWidth=1.6; c.strokeStyle='rgba(15,9,3,0.4)'; c.stroke();
    c.restore();

    // a small, sharp specular hotspot — a real polished-metal glint, tighter and brighter
    // than the broad ambient gradient beneath it
    c.save(); gearOutline(c, N, wornTooth); c.clip();
    const hx=R*LX*0.42, hy=R*LY*0.42, hr=R*0.22;
    const spec=c.createRadialGradient(hx,hy,0,hx,hy,hr);
    spec.addColorStop(0,'rgba(255,252,238,0.55)'); spec.addColorStop(0.5,'rgba(255,248,225,0.18)'); spec.addColorStop(1,'rgba(255,248,225,0)');
    c.fillStyle=spec; c.beginPath(); c.arc(hx,hy,hr,0,7); c.fill();
    c.restore();

    // structural details, drawn crisp on top — machined precision against the organic wear
    c.lineWidth=1.3; c.strokeStyle='rgba(55,38,14,0.65)'; gearOutline(c,N,wornTooth); c.stroke();
    c.beginPath(); c.arc(0,0,R-DED-3,0,7); c.lineWidth=2; c.strokeStyle='rgba(80,55,22,0.4)'; c.stroke();
    if(N>=15){ const hn=Math.min(6,Math.floor(N/4)), hr=(R-DED)*0.55, hrad=R*0.13;
      for(let i=0;i<hn;i++){ const ha=i/hn*2*Math.PI; c.beginPath(); c.arc(hr*Math.cos(ha),hr*Math.sin(ha),hrad,0,7);
        c.fillStyle='#241b12'; c.fill(); c.lineWidth=1; c.strokeStyle='rgba(90,62,26,0.45)'; c.stroke(); } }
    c.beginPath(); c.arc(0,0,R*0.24,0,7); c.fillStyle='#bd8f48'; c.fill(); c.lineWidth=1.1; c.strokeStyle='rgba(55,38,14,0.6)'; c.stroke();
    // a bright polish-worn ring right at the bore, where an axle has turned against it for years
    c.beginPath(); c.arc(0,0,R*0.115,0,7); c.lineWidth=1.4; c.strokeStyle='rgba(255,236,190,0.5)'; c.stroke();
    c.beginPath(); c.arc(0,0,R*0.10,0,7); c.fillStyle='#20170f'; c.fill();
    if(driver){ c.beginPath(); c.arc(R*0.42,0,R*0.11,0,7); c.fillStyle='#e7d7a8'; c.fill(); c.strokeStyle='rgba(55,38,14,0.6)'; c.stroke(); }

    return {canvas:off, size, half:size/2};
  }
  function getGearSprite(g){
    let s=spriteCache.get(g.id);
    if(!s){ s=buildGearSprite(g.N,g.fixed,g.id+1); spriteCache.set(g.id,s); }
    return s;
  }
  function drawGear(g,dim){
    const R=pitchR(g.N);
    ctx.save(); ctx.translate(g.x,g.y);
    ctx.save(); ctx.rotate(g.angle); ctx.translate(3,4.5); gearOutline(ctx,g.N); ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fill(); ctx.restore();
    ctx.rotate(g.angle);
    const sp=getGearSprite(g);
    if(dim) ctx.filter='saturate(0.42) brightness(0.68)';
    ctx.drawImage(sp.canvas, -sp.half/2, -sp.half/2, sp.half, sp.half);
    if(dim) ctx.filter='none';
    ctx.restore();
  }

  // ---- meshing train from the driver ----
  function buildTrain(){
    const n=gears.length, adj=Array.from({length:n},()=>[]);
    for(let i=0;i<n;i++)for(let j=i+1;j<n;j++){ const a=gears[i],b=gears[j];
      const d=Math.hypot(a.x-b.x,a.y-b.y), t=pitchR(a.N)+pitchR(b.N);
      if(Math.abs(d-t)<MESH_TOL){ adj[i].push(j); adj[j].push(i); } }
    const parent=new Array(n).fill(-2), order=[]; if(n){ parent[0]=-1; const q=[0];
      while(q.length){ const u=q.shift(); order.push(u); for(const v of adj[u]) if(parent[v]===-2){ parent[v]=u; q.push(v);} } }
    return {parent,order};
  }

  // ---- drag / place / remove ----
  let drag=null;
  const P=e=>({x:e.clientX,y:e.clientY});
  canvas.addEventListener('pointerdown',e=>{ const {x,y}=P(e);
    for(const t of trayRects){ if(Math.hypot(x-t.cx,y-t.cy)<t.hit){ const g=mk(t.N,x,y,false); gears.push(g); drag={g,ox:0,oy:0}; canvas.setPointerCapture(e.pointerId); return; } }
    for(let i=gears.length-1;i>=0;i--){ const g=gears[i]; if(Math.hypot(x-g.x,y-g.y)<outerR(g.N)){ drag={g,ox:x-g.x,oy:y-g.y}; canvas.setPointerCapture(e.pointerId); return; } }
  });
  // gears are solid — dragged one can reach exact meshing distance against a neighbour
  // (teeth touching) but never closer than that; push it back out if the cursor tries to
  // shove it through another gear
  function resolveOverlap(g){
    for(let iter=0; iter<4; iter++){ let moved=false;
      for(const o of gears){ if(o===g) continue;
        const minD=pitchR(g.N)+pitchR(o.N), dx=g.x-o.x, dy=g.y-o.y, d=Math.hypot(dx,dy);
        if(d<minD-0.01){ const a=d>1e-6?Math.atan2(dy,dx):Math.random()*Math.PI*2;
          g.x=o.x+Math.cos(a)*minD; g.y=o.y+Math.sin(a)*minD; moved=true; } }
      if(!moved) break; }
  }
  canvas.addEventListener('pointermove',e=>{ if(!drag) return; const {x,y}=P(e); drag.g.x=x-drag.ox; drag.g.y=y-drag.oy; resolveOverlap(drag.g); });
  function endDrag(e){ if(!drag) return; const g=drag.g, {x,y}=P(e);
    if(y<130 && !g.fixed){ gears=gears.filter(k=>k!==g); }   // dropped in the tray band -> remove (never the driver)
    else {                                              // nudge to exact mesh distance if close to a neighbour
      let best=null,err=1e9; for(const o of gears){ if(o===g) continue; const t=pitchR(g.N)+pitchR(o.N); const e2=Math.abs(Math.hypot(g.x-o.x,g.y-o.y)-t); if(e2<err){err=e2;best=o;} }
      if(best&&err<SNAP_TOL){ const t=pitchR(g.N)+pitchR(best.N), a=Math.atan2(g.y-best.y,g.x-best.x); g.x=best.x+Math.cos(a)*t; g.y=best.y+Math.sin(a)*t; }
    }
    drag=null;
  }
  canvas.addEventListener('pointerup',endDrag);
  canvas.addEventListener('pointercancel',endDrag);

  // ---- loop ----
  let last=performance.now();
  function tick(now){
    const dt=Math.min(now-last,50)/1000; last=now;
    const {parent,order}=buildTrain();
    const speed=speedSlider.value/50;
    if(runChk.checked) gears[0].angle += speed*1.05*dt;
    for(const idx of order){ if(idx===0) continue; const g=gears[idx], p=gears[parent[idx]];
      const conn=Math.atan2(g.y-p.y,g.x-p.x);
      g.angle=-(p.N/g.N)*(p.angle-conn)+conn+Math.PI+Math.PI/g.N; }
    const connected=new Set(order);

    ctx.clearRect(0,0,W,H);
    // tray
    for(const t of trayRects){ ctx.save(); ctx.translate(t.cx,t.cy); const s=Math.min(1,(t.hit*0.95)/outerR(t.N)); ctx.scale(s,s); gearBody(t.N,false,false); ctx.restore(); }
    // board gears — dim the ones not part of the running train
    for(let i=0;i<gears.length;i++){ const g=gears[i]; drawGear(g, !connected.has(i) && !g.fixed); }
    requestAnimationFrame(tick);
  }
  resize(); requestAnimationFrame(tick);
})();
</script>
</body>
</html>
