<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>warmler — finish picker concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400&display=swap');
  :root{
    --bg:#05070c; --panel:#0d1420;
    --brass:#c9974e; --brass-light:#e8c383;
    --parchment:#f2e9d8;
  }
  *{box-sizing:border-box;}
  html,body{
    height:100%; margin:0;
    background: radial-gradient(ellipse at 50% 38%, var(--panel) 0%, var(--bg) 72%);
    color:var(--parchment);
    font-family:'Jost', sans-serif;
    display:flex; align-items:center; justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }
  #stage{ text-align:center; }

  /* the trigger swatch shown on the page itself — stands in for the
     actual warmler object in this concept */
  #trigger{
    width:160px; height:88px;
    border-radius:8px;
    border:1.5px solid rgba(201,151,78,0.5);
    cursor:pointer;
    overflow:hidden;
    padding:0;
    position:relative;
    box-shadow:0 8px 24px rgba(0,0,0,0.5);
    transition:transform .25s ease, border-color .25s ease;
  }
  #trigger:hover{ transform:translateY(-2px); border-color:var(--brass-light); }
  #trigger img{ width:100%; height:100%; object-fit:cover; display:block; }


  /* popup */
  #overlay{
    position:fixed; inset:0;
    background:rgba(5,7,12,0.72);
    backdrop-filter:blur(3px);
    display:none;
    align-items:center; justify-content:center;
    z-index:100;
  }
  #overlay.open{ display:flex; }
  #popup{
    width:min(86vw, 260px);
    max-height:70vh;
    background:#0d1420;
    border:1px solid rgba(201,151,78,0.4);
    border-radius:14px;
    box-shadow:0 30px 80px rgba(0,0,0,0.6);
    overflow:hidden;
  }
  #swatch-list{
    overflow-y:auto;
    padding:14px;
    display:flex; flex-direction:column; gap:10px;
  }
  .swatch-option{
    background:transparent; border:1.5px solid rgba(201,151,78,0.18);
    border-radius:8px; padding:0; cursor:pointer;
    display:block; overflow:hidden;
    transition:border-color .2s ease;
  }
  .swatch-option:hover{ border-color:rgba(232,195,131,0.6); }
  .swatch-option.selected{ border-color:var(--brass-light); }
  .swatch-option img{
    width:100%; height:64px; object-fit:cover; display:block;
  }
</style>
</head>

    <img id="trigger-img" src="" alt="">
  </button>
</div>

<script>
(function(){
  const trigger = document.getElementById('trigger');
  const triggerImg = document.getElementById('trigger-img');
  const overlay = document.getElementById('overlay');
  const options = document.querySelectorAll('.swatch-option');

  let current = options[0];
  syncTrigger(current);

  trigger.addEventListener('click', () => overlay.classList.add('open'));
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('open'); });

  options.forEach(opt => {
    opt.addEventListener('click', () => {
      current = opt;
      syncTrigger(opt);
      overlay.classList.remove('open');
    });
  });

  function syncTrigger(opt){
    options.forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    triggerImg.src = opt.querySelector('img').src;
  }
})();
</script>
