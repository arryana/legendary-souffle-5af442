<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>rain — sagne</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root{
    --bg1:#0f1420; --bg2:#1c2433;
    --brass:#c9974e; --parchment:#f2e9d8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%; margin:0; overflow:hidden;
    background: radial-gradient(ellipse at 50% 35%, var(--bg2) 0%, var(--bg1) 75%);
    font-family: Georgia, serif; color:var(--parchment);
  }
  #backlink{
    position:fixed; top:18px; left:22px; z-index:50;
    color:var(--parchment); opacity:.5; text-decoration:none;
    font-size:14px; letter-spacing:.04em; transition:opacity .3s ease;
  }
  #backlink:hover{opacity:.9;}

  #stage{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  #paneWrap{
    position:relative;
    width:min(70vw, 460px); height:min(88vw, 620px);
    max-height:64vh;
    border-radius:4px;
    box-shadow:
      0 0 0 14px #3a2d1e,
      0 0 0 16px rgba(0,0,0,0.4),
      0 25px 70px rgba(0,0,0,0.6);
    overflow:hidden;
  }
  canvas{ width:100%; height:100%; display:block; }

  #dock{
    position:fixed; bottom:0; left:0; right:0;
    display:flex; align-items:center; justify-content:center; gap:14px;
    padding:16px 18px 26px;
    background:linear-gradient(to top, rgba(10,13,20,.85), rgba(10,13,20,0));
    z-index:40;
  }
  #tiltRow{ display:flex; align-items:center; gap:12px; }
  input[type=range]{
    -webkit-appearance:none; appearance:none;
    width:180px; height:3px; border-radius:3px;
    background:rgba(242,233,216,.25); outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:var(--brass); cursor:pointer;
    box-shadow:0 0 6px rgba(201,151,78,.6);
  }
  input[type=range]::-moz-range-thumb{
    width:14px; height:14px; border-radius:50%; border:none;
    background:var(--brass); cursor:pointer;
  }
</style>
</head>
<body>

<a id="backlink" href="index.html">← sagne</a>

<div id="stage">
  <div id="paneWrap">
    <canvas id="scene"></canvas>
  </div>
</div>

<div id="dock">
  <div id="tiltRow">
    <span title="tilt">📐</span>
    <input type="range" id="tiltSlider" min="0" max="100" value="35">
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');
  const paneWrap = document.getElementById('paneWrap');
  const tiltSlider = document.getElementById('tiltSlider');

  let W = 0, H = 0, DPR = 1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const rect = paneWrap.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    metaCanvas.width = W; metaCanvas.height = H;
  }
  window.addEventListener('resize', resize);

  let tilt = tiltSlider.value / 100;
  tiltSlider.addEventListener('input', () => { tilt = tiltSlider.value / 100; });

  // ---------- background: a softly blurred, out-of-focus garden, so
  // there's genuinely something behind the glass for the droplets to sit
  // in front of, without needing true optical refraction ----------
  function drawBackground(){
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#3a4a3a');
    g.addColorStop(0.55, '#2e3d2c');
    g.addColorStop(1, '#1f2a20');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // soft out-of-focus blobs, fixed positions — a hedge/tree suggestion
    const blobs = [
      [0.2,0.25,0.28,'#5c7a4a'], [0.7,0.15,0.22,'#4a6a52'],
      [0.5,0.5,0.35,'#3e5c3a'], [0.15,0.7,0.25,'#33482e'],
      [0.85,0.65,0.3,'#425c3c'], [0.4,0.85,0.22,'#2a3c26'],
    ];
    ctx.save();
    ctx.filter = 'blur(28px)';
    blobs.forEach(([bx,by,br,col]) => {
      ctx.beginPath();
      ctx.ellipse(bx*W, by*H, br*W, br*H*0.8, 0, 0, Math.PI*2);
      ctx.fillStyle = col;
      ctx.fill();
    });
    ctx.restore();
  }

  // ---------- droplets ----------
  let drops = [];
  function spawnDrop(){
    drops.push({
      x: Math.random()*W,
      y: -10 - Math.random()*40,
      r: 3 + Math.random()*4,
      vy: 0,
      wobble: Math.random()*Math.PI*2,
    });
  }
  for (let i=0; i<14; i++){
    drops.push({ x: Math.random()*W, y: Math.random()*H, r: 3+Math.random()*5, vy: 0, wobble: Math.random()*Math.PI*2 });
  }

  let spawnAccum = 0;
  function stepDrops(dt){
    // more tilt = more of gravity acts along the pane, so droplets slide
    // faster; at zero tilt the glass is effectively flat and nothing
    // slides at all — one input driving the whole system
    const gravity = tilt * 0.055;

    spawnAccum += dt * (0.5 + tilt*1.5);
    if (spawnAccum > 14){
      spawnAccum = 0;
      if (drops.length < 90) spawnDrop();
    }

    for (const d of drops){
      // smaller droplets are held more by surface tension relative to
      // their weight, so they need more speed before they really commit
      // to sliding, and drag more once moving
      const drag = 0.985 - Math.min(0.05, 3/(d.r*d.r));
      d.vy += gravity * dt;
      d.vy *= Math.pow(drag, dt);
      d.y += d.vy * dt;
      d.wobble += dt * 0.03;
      d.x += Math.sin(d.wobble) * 0.04 * dt * Math.min(1, d.vy*0.5);
    }

    // trail-following: on a real window, a sliding droplet tends to
    // drift toward whatever track a nearby droplet ahead of it has
    // already started — that's the actual reason rain forms merging
    // streaks rather than every drop falling in its own untouched
    // straight line. Without this, droplets spawn at essentially random
    // x positions and almost never cross paths closely enough to merge.
    for (const d of drops){
      if (d.vy < 0.05) continue;
      let nearestBelow = null, nearestDist = Infinity;
      for (const other of drops){
        if (other === d) continue;
        if (other.y <= d.y) continue;
        const dx = other.x - d.x, dy = other.y - d.y;
        if (dy > 90 || Math.abs(dx) > 45) continue;
        const dist = Math.hypot(dx, dy);
        if (dist < nearestDist){ nearestDist = dist; nearestBelow = other; }
      }
      if (nearestBelow){
        const pull = Math.min(1, dt*0.05) * Math.max(0, 1 - nearestDist/100);
        d.x += (nearestBelow.x - d.x) * pull;
      }
    }

    // merging: real droplets that touch pull into one via surface
    // tension, conserving area (2D stand-in for volume) and momentum
    for (let i=0; i<drops.length; i++){
      for (let j=drops.length-1; j>i; j--){
        const a = drops[i], b = drops[j];
        const dx = a.x-b.x, dy = a.y-b.y;
        const dist = Math.hypot(dx,dy);
        if (dist < (a.r+b.r)*0.95){
          const ma = a.r*a.r, mb = b.r*b.r;
          const totalM = ma+mb;
          a.x = (a.x*ma + b.x*mb)/totalM;
          a.y = (a.y*ma + b.y*mb)/totalM;
          a.vy = (a.vy*ma + b.vy*mb)/totalM;
          a.r = Math.sqrt(ma+mb);
          a.wobble = a.wobble;
          drops.splice(j,1);
        }
      }
    }

    drops = drops.filter(d => d.y - d.r < H + 20);
  }

  // ---------- metaball rendering: draw solid circles, blur, then push
  // the blur's contrast way up so it snaps back to crisp edges only
  // where circles are close enough to blend — the classic "gooey"
  // technique, done here with the canvas's own filter chain rather than
  // manual pixel manipulation ----------
  const metaCanvas = document.createElement('canvas');
  const metaCtx = metaCanvas.getContext('2d');

  function drawDrops(){
    metaCtx.clearRect(0,0,W,H);
    metaCtx.save();
    metaCtx.filter = 'blur(6px) contrast(35)';
    metaCtx.fillStyle = '#dff0ff';
    for (const d of drops){
      const stretch = Math.min(2.2, 1 + d.vy*0.12);
      metaCtx.beginPath();
      metaCtx.ellipse(d.x, d.y, d.r, d.r*stretch, 0, 0, Math.PI*2);
      metaCtx.fill();
    }
    metaCtx.restore();

    // use the merged blob shapes as a clip, then draw the actual glassy
    // droplet look (refracted-looking tint + highlight) inside it —
    // this keeps the goo shape but lets it look like water, not paint
    ctx.save();
    ctx.drawImage(metaCanvas, 0, 0);
    ctx.globalCompositeOperation = 'source-atop';
    // subtle cool tint + a bright highlight offset toward the top-left,
    // consistent light direction across every droplet
    const tint = ctx.createLinearGradient(0,0,0,H);
    tint.addColorStop(0, 'rgba(200,225,240,0.35)');
    tint.addColorStop(1, 'rgba(160,190,215,0.25)');
    ctx.fillStyle = tint;
    ctx.fillRect(0,0,W,H);
    for (const d of drops){
      const stretch = Math.min(2.2, 1 + d.vy*0.12);
      const hi = ctx.createRadialGradient(d.x-d.r*0.3, d.y-d.r*stretch*0.35, 0, d.x-d.r*0.3, d.y-d.r*stretch*0.35, d.r*0.9);
      hi.addColorStop(0, 'rgba(255,255,255,0.8)');
      hi.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = hi;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r*1.3, d.r*stretch*1.3, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  let lastT = performance.now();
  function loop(t){
    const dt = Math.min(t - lastT, 50) / 16.67;
    lastT = t;
    stepDrops(dt);
    drawBackground();
    drawDrops();
    requestAnimationFrame(loop);
  }

  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
