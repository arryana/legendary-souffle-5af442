<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>birds — sagne</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root{ --bg1:#0f1420; --bg2:#1c2433; --brass:#c9974e; --parchment:#f2e9d8; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ height:100%; margin:0; overflow:hidden; background:#7fa8c9; font-family: Georgia, serif; color:var(--parchment); }
  #backlink{ position:fixed; top:18px; left:22px; z-index:50; color:var(--parchment); opacity:.6; text-decoration:none; font-size:14px; letter-spacing:.04em; text-shadow:0 1px 3px rgba(0,0,0,.5), 0 0 9px rgba(0,0,0,.3); transition:opacity .3s ease; }
  #backlink:hover{opacity:1;}
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  #dock{ position:fixed; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:16px;
    padding:14px 18px 24px; background:linear-gradient(to top, rgba(10,13,20,.35), rgba(10,13,20,0)); z-index:40; }
  .glyph{ font-size:15px; opacity:.85; text-shadow:0 1px 3px rgba(0,0,0,.4); }
  #sparrowRow{ display:flex; align-items:center; gap:10px; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:200px; height:3px; border-radius:3px; background:rgba(242,233,216,.4); outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--brass); cursor:pointer; box-shadow:0 0 6px rgba(0,0,0,.4); }
</style>
</head>
<body>
<a id="backlink" href="index.html">← sagne</a>
<canvas id="scene"></canvas>
<div id="dock">
  <div id="sparrowRow"><span class="glyph">sparrows</span><input type="range" id="sparrowSlider" min="0" max="18" value="6"></div>
</div>
<script>
(function(){
  const canvas=document.getElementById('scene'), ctx=canvas.getContext('2d');
  const sparrowSlider=document.getElementById('sparrowSlider');
  let W=0,H=0,DPR=1;

  // ---- wire: a chain of sample points between two fixed poles, spring-damped toward a
  // target height that's the wire's own catenary sag plus a localized dip under each bird
  // currently sitting near that point — landing/departure naturally produces a dip-and-settle
  // or a spring-back-and-oscillate, since it's just this spring chasing a moving target
  const WIRE_N=48;
  let poleX0=0, poleX1=0, wireY=0, wire=[];
  function layout(){
    poleX0=W*0.10; poleX1=W*0.90; wireY=H*0.42;
    wire=[]; for(let i=0;i<WIRE_N;i++){ const t=i/(WIRE_N-1);
      wire.push({t, x:poleX0+(poleX1-poleX0)*t, y:wireY, vy:0}); }
  }
  const SAG=85;            // how much the unloaded wire sags at its centre — a real catenary
                            // droop across the whole span, not just a pinch under the birds
  const DIP_SIGMA=85;      // wide enough that several nearby birds blend into one smooth
                            // basin instead of a sum of narrow overlapping spikes
  const DIP_DEPTH=11;      // how far a single sparrow's weight dips the wire under it
  const MAX_DIP=60;        // a cluster's dip saturates instead of stacking without limit —
                            // ten birds shouldn't dig ten times deeper than one
  function restY(t){ return wireY + SAG*4*t*(1-t); }   // simple parabolic sag, good enough visually
  function targetY(x){
    const t=(x-poleX0)/(poleX1-poleX0), base=restY(t);
    let raw=0;
    for(const b of sparrows){ if(b.state==='perched'||b.state==='landing'||b.state==='shuffling'||b.state==='flapping'){
      const d=x-b.x; raw += DIP_DEPTH*Math.exp(-(d*d)/(2*DIP_SIGMA*DIP_SIGMA)); } }
    const dip = MAX_DIP*(1-Math.exp(-raw/MAX_DIP));
    return base+dip;
  }
  function stepWire(dt){
    const k=90, damp=8.5;
    for(const p of wire){ const ty=targetY(p.x);
      const acc=(ty-p.y)*k - p.vy*damp;
      p.vy+=acc*dt; p.y+=p.vy*dt; }
  }
  function wireYAt(x){
    const t=Math.max(0,Math.min(1,(x-poleX0)/(poleX1-poleX0)));
    const i=Math.min(WIRE_N-2, Math.floor(t*(WIRE_N-1)));
    const p0=wire[i], p1=wire[i+1], lt=(t*(WIRE_N-1))-i;
    return p0.y+(p1.y-p0.y)*lt;
  }

  // ---- sky: a warm sunset backdrop, purely decorative behind everything else — nothing
  // here touches the poles/wire/bird logic at all ----
  let cloudPuffs=null, skylinePts=null, skyInitW=-1;
  function initSky(){
    cloudPuffs=[];
    for(let i=0;i<7;i++){ cloudPuffs.push({
      x:Math.random()*W, y:H*(0.08+Math.random()*0.32), rx:W*(0.09+Math.random()*0.10),
      ry:H*(0.018+Math.random()*0.02), a:0.10+Math.random()*0.14 }); }
    skylinePts=[]; let x=0;
    while(x<W){ const w=40+Math.random()*70, h=H*0.02+Math.random()*H*0.05;
      skylinePts.push({x,h}); x+=w; skylinePts.push({x,h:h*0.6}); }
  }
  function drawSky(){
    if(!cloudPuffs || skyInitW!==W){ initSky(); skyInitW=W; }
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#4a4368'); sky.addColorStop(0.35,'#c1667e');
    sky.addColorStop(0.62,'#e8935a'); sky.addColorStop(0.82,'#f5b876'); sky.addColorStop(1,'#fbdca0');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // the sun, low on the horizon, with a soft glow
    const sunX=W*0.62, sunY=H*0.88, sunR=H*0.09;
    const glow=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR*3.2);
    glow.addColorStop(0,'rgba(255,244,214,0.9)'); glow.addColorStop(0.25,'rgba(255,214,150,0.45)'); glow.addColorStop(1,'rgba(255,214,150,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(sunX,sunY,sunR*3.2,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,248,228,0.85)'; ctx.beginPath(); ctx.arc(sunX,sunY,sunR,0,7); ctx.fill();

    // a few soft, low clouds catching the warm light
    for(const c of cloudPuffs){ ctx.fillStyle=`rgba(70,45,55,${c.a})`;
      ctx.beginPath(); ctx.ellipse(c.x,c.y,c.rx,c.ry,0,0,7); ctx.fill(); }

    // a dark, distant skyline along the bottom edge — hills and rooftops, pure silhouette
    ctx.fillStyle='rgba(28,22,26,0.9)';
    ctx.beginPath(); ctx.moveTo(0,H);
    for(const p of skylinePts) ctx.lineTo(p.x,H-p.h);
    ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  }

  // ---- poles: real telephone-pole bulk, not a tightrope line — a tapered timber trunk,
  // a proper crossbar, and a couple of insulator nubs where the wire actually attaches ----
  function drawPoles(){
    for(const px of [poleX0,poleX1]){
      const top=wireY-78, bot=H, wTop=6, wBot=11;
      ctx.fillStyle='rgba(38,30,22,0.92)';
      ctx.beginPath();
      ctx.moveTo(px-wTop,top); ctx.lineTo(px+wTop,top);
      ctx.lineTo(px+wBot,bot); ctx.lineTo(px-wBot,bot);
      ctx.closePath(); ctx.fill();
      // a soft highlight down one side, so it doesn't read as a flat silhouette
      ctx.fillStyle='rgba(90,72,52,0.25)';
      ctx.beginPath(); ctx.moveTo(px-wTop,top); ctx.lineTo(px-wTop*0.2,top); ctx.lineTo(px-wBot*0.3,bot); ctx.lineTo(px-wBot,bot); ctx.closePath(); ctx.fill();

      const cbY=wireY-82, cbW=42, cbH=6;
      ctx.fillStyle='rgba(38,30,22,0.92)';
      ctx.fillRect(px-cbW/2,cbY,cbW,cbH);
      // insulator nubs — the wire actually terminates on top of one of these
      for(const ix of [-cbW/2+7, cbW/2-7]){
        ctx.fillStyle='rgba(60,52,40,0.9)';
        ctx.fillRect(px+ix-2.5,cbY-7,5,7);
        ctx.beginPath(); ctx.ellipse(px+ix,cbY-8,4,2.4,0,0,7); ctx.fill();
      }
    }
  }
  function drawWire(){
    ctx.strokeStyle='rgba(30,24,18,0.75)'; ctx.lineWidth=2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(wire[0].x,wire[0].y);
    for(let i=1;i<wire.length;i++) ctx.lineTo(wire[i].x,wire[i].y);
    ctx.stroke();
  }

  // ---- sparrows ----
  let sparrows=[], idc=0;
  const PSR=34;           // personal-space radius along the wire
  const FLAP_HZ=11;       // wing-beat rate while actually flying
  function pickLandingX(){
    // prefer landing near an existing sparrow, otherwise near centre, with a little randomness
    if(sparrows.some(b=>b.state!=='departing'&&b.state!=='arriving')){
      const anchor=sparrows[Math.floor(Math.random()*sparrows.length)];
      let x=anchor.x+(Math.random()<0.5?-1:1)*(PSR*0.7+Math.random()*PSR*0.6);
      return Math.max(poleX0+30,Math.min(poleX1-30,x));
    }
    return (poleX0+poleX1)/2 + (Math.random()-0.5)*60;
  }
  function spawnSparrow(){
    const fromLeft=Math.random()<0.5;
    const targetX=pickLandingX();
    const b={id:idc++, state:'arriving', x: fromLeft?-40:W+40, y:H*0.25+Math.random()*60,
      targetX, facing: fromLeft?1:-1, wingPhase:Math.random()*7, t:0, shuffleFrom:0, shuffleTo:0, shuffleT:0};
    sparrows.push(b);
  }
  function removeSparrow(){
    const alive=sparrows.filter(b=>b.state!=='departing'&&b.state!=='arriving');
    if(!alive.length) return;
    const b=alive[Math.floor(Math.random()*alive.length)];
    b.state='departing'; b.t=0; b.facing=Math.random()<0.5?-1:1;
  }

  // when a bird lands near others, give crowded neighbours a chance to shuffle away, or
  // flap in place if there's nowhere to go
  function settleCrowding(landedX){
    for(const n of sparrows){
      if(n.state!=='perched') continue;
      const d=n.x-landedX;
      if(Math.abs(d)<PSR){
        const dir=d>=0?1:-1;
        const roomTo=n.x+dir*PSR*1.15;
        const blocked = sparrows.some(o=>o!==n && (o.state==='perched'||o.state==='shuffling') && Math.abs(o.x-roomTo)<PSR*0.55)
          || roomTo<poleX0+30 || roomTo>poleX1-30;
        if(!blocked){ n.state='shuffling'; n.shuffleFrom=n.x; n.shuffleTo=roomTo; n.shuffleT=0; n.facing=dir; }
        else { n.state='flapping'; n.t=0; }
      }
    }
  }

  function updateSparrows(dt){
    for(const b of sparrows){
      b.t+=dt; b.wingPhase+=dt*FLAP_HZ*2*Math.PI;
      if(b.state==='arriving'){
        const landY=wireYAt(b.targetX)-9;
        const dx=b.targetX-b.x, dy=landY-b.y, dist=Math.hypot(dx,dy);
        const speed=220;
        if(dist<6){ b.state='landing'; b.t=0; b.x=b.targetX; b.y=landY; settleCrowding(b.targetX); }
        else { b.x+=dx/dist*speed*dt; b.y+=dy/dist*speed*dt; b.facing=dx>=0?1:-1; }
      } else if(b.state==='landing'){
        b.y=wireYAt(b.x)-9;
        if(b.t>0.28) b.state='perched';
      } else if(b.state==='perched'){
        b.y=wireYAt(b.x)-9;
      } else if(b.state==='shuffling'){
        b.shuffleT+=dt/0.5;
        const s=Math.min(1,b.shuffleT), e=s<0.5?2*s*s:1-Math.pow(-2*s+2,2)/2;
        b.x=b.shuffleFrom+(b.shuffleTo-b.shuffleFrom)*e;
        b.y=wireYAt(b.x)-9;
        if(s>=1) b.state='perched';
      } else if(b.state==='flapping'){
        b.y=wireYAt(b.x)-9-Math.abs(Math.sin(b.wingPhase*0.5))*2;
        if(b.t>0.45) b.state='perched';
      } else if(b.state==='departing'){
        b.y-=70*dt; b.x+=b.facing*160*dt;
      }
    }
    sparrows=sparrows.filter(b=> !(b.state==='departing' && (b.x<-60||b.x>W+60)));
  }

  // ---- silhouette drawing ----
  function drawSparrow(b){
    const s=13; // body scale
    ctx.save(); ctx.translate(b.x,b.y); ctx.scale(b.facing,1);
    ctx.fillStyle='#141210';
    let wingAngle;
    if(b.state==='arriving'||b.state==='departing') wingAngle=0.55+Math.sin(b.wingPhase)*0.5;
    else if(b.state==='landing') wingAngle=0.7-Math.min(1,b.t/0.28)*0.65;
    else if(b.state==='flapping') wingAngle=Math.abs(Math.sin(b.wingPhase*1.6))*0.5;
    else if(b.state==='shuffling') wingAngle=0.06+Math.abs(Math.sin(b.wingPhase*0.6))*0.08;
    else wingAngle=0.03*Math.sin(b.t*1.3+b.id);   // perched: a tiny idle twitch

    // wings, drawn first so the body overlaps their root
    ctx.save(); ctx.rotate(-wingAngle);
    ctx.beginPath(); ctx.moveTo(-1,0); ctx.quadraticCurveTo(-s*0.9,-s*0.15,-s*1.5,-s*0.05);
    ctx.quadraticCurveTo(-s*0.9,s*0.22,-1,s*0.12); ctx.closePath(); ctx.fill();
    ctx.restore();

    // body
    ctx.beginPath(); ctx.ellipse(0,0,s*0.62,s*0.46,0,0,7); ctx.fill();
    // head
    ctx.beginPath(); ctx.arc(s*0.5,-s*0.22,s*0.34,0,7); ctx.fill();
    // tail
    ctx.beginPath(); ctx.moveTo(-s*0.55,-s*0.08); ctx.lineTo(-s*1.15,-s*0.22); ctx.lineTo(-s*1.15,s*0.06); ctx.lineTo(-s*0.55,s*0.16); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=window.innerWidth; H=window.innerHeight;
    canvas.width=W*DPR; canvas.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
    layout();
  }
  window.addEventListener('resize',resize);

  let wantCount=6;
  sparrowSlider.addEventListener('input',()=>{ wantCount=+sparrowSlider.value; });
  let spawnTimer=0;

  let last=performance.now();
  function tick(now){
    const dt=Math.min((now-last)/1000,0.05); last=now;
    const alive=sparrows.filter(b=>b.state!=='departing').length;
    spawnTimer-=dt;
    if(alive<wantCount && spawnTimer<=0){ spawnSparrow(); spawnTimer=0.35+Math.random()*0.5; }
    else if(alive>wantCount && spawnTimer<=0){ removeSparrow(); spawnTimer=0.3+Math.random()*0.4; }

    stepWire(dt);
    updateSparrows(dt);

    ctx.clearRect(0,0,W,H);
    drawSky();

    drawPoles(); drawWire();
    const order=[...sparrows].sort((a,b)=>a.y-b.y);
    for(const b of order) drawSparrow(b);

    requestAnimationFrame(tick);
  }
  resize(); requestAnimationFrame(tick);
})();
</script>
</body>
</html>
