<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>warmler — sagne</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root{
    --bg1:#0f1420; --bg2:#1c2433;
    --brass:#c9974e; --parchment:#f2e9d8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%; margin:0; overflow:hidden;
    background: radial-gradient(ellipse at 50% 35%, var(--bg2) 0%, var(--bg1) 75%);
    font-family: Georgia, serif; color:var(--parchment);
  }
  #backlink{
    position:fixed; top:18px; left:22px; z-index:50;
    color:var(--parchment); opacity:.5; text-decoration:none;
    font-size:14px; letter-spacing:.04em; transition:opacity .3s ease;
  }
  #backlink:hover{opacity:.9;}

  #stage{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  #plateWrap{
    position:relative;
    width:min(88vw, 640px, 109.5vh);
    aspect-ratio: 1402 / 768;
    border-radius:clamp(14px, 3.2vw, 30px);
    overflow:hidden;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.4),
      0 25px 70px rgba(0,0,0,0.6);
  }
  canvas{
    position:absolute; inset:0;
    width:100%; height:100%; display:block;
    touch-action:none;
  }
  #plateOverlay{
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
    pointer-events:none;
    transition:opacity .3s ease;
  }
  /* a soft plastic sheen, clipped to whichever finish's real oval is
     currently selected — updated in JS whenever the finish changes */
  #sheen{
    position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse at 30% 22%, rgba(255,255,255,0.35), rgba(255,255,255,0) 35%),
      radial-gradient(ellipse at 75% 80%, rgba(255,255,255,0.08), rgba(255,255,255,0) 40%);
  }

  /* finish picker — a small swatch that opens a scrollable, wordless
     popup of the seven plate finishes */
  #finishTrigger{
    width:52px; height:30px;
    border-radius:6px;
    border:1.5px solid rgba(201,151,78,0.5);
    cursor:pointer; padding:0; overflow:hidden; flex-shrink:0;
    box-shadow:0 6px 16px rgba(0,0,0,0.5);
    transition:transform .25s ease, border-color .25s ease;
  }
  #finishTrigger:hover{ transform:translateY(-1px); border-color:#e8c383; }
  #finishTrigger img{ width:100%; height:100%; object-fit:cover; display:block; }
  #dockDivider{
    width:1px; height:26px;
    background:rgba(242,233,216,0.2);
    flex-shrink:0;
  }

  #finishOverlay{
    position:fixed; inset:0; z-index:100;
    background:rgba(5,7,12,0.72);
    backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center;
    padding:24px 0;
  }
  #finishOverlay.open{ display:flex; }
  #finishPopup{
    width:min(80vw, 240px);
    max-height:70vh; max-height:70dvh;
    background:#0d1420;
    border:1px solid rgba(201,151,78,0.4);
    border-radius:14px;
    box-shadow:0 30px 80px rgba(0,0,0,0.6);
    overflow:hidden;
  }
  #finishList{
    overflow-y:auto;
    padding:12px 12px 18px;
    display:flex; flex-direction:column; gap:9px;
  }
  .finishOption{
    background:transparent; border:1.5px solid rgba(201,151,78,0.18);
    border-radius:7px; padding:0; cursor:pointer; overflow:hidden; display:block;
    transition:border-color .2s ease;
  }
  .finishOption:hover{ border-color:rgba(232,195,131,0.6); }
  .finishOption.selected{ border-color:#e8c383; }
  .finishOption img{ width:100%; height:56px; object-fit:cover; display:block; }

  #dock{
    position:fixed; bottom:0; left:0; right:0;
    display:flex; align-items:center; justify-content:center; gap:10px;
    padding:16px 18px 26px;
    background:linear-gradient(to top, rgba(10,13,20,.85), rgba(10,13,20,0));
    z-index:40;
  }
  .modeBtn{
    width:38px; height:38px; border-radius:50%;
    border:1px solid rgba(242,233,216,.3);
    cursor:pointer; opacity:.6; transition:all .25s ease;
    padding:0;
  }
  .modeBtn.active{ opacity:1; border-color:var(--brass); box-shadow:0 0 8px rgba(201,151,78,.5); transform:scale(1.08); }
  .modeBtn:hover{ opacity:1; }
</style>
</head>
<body>

<a id="backlink" href="index.html">← sagne</a>
<div id="finishOverlay">
  <div id="finishPopup">
    <div id="finishList">
      <button class="finishOption" data-finish="silver"><img src="warmler-swatch-silver.png" alt=""></button>
      <button class="finishOption" data-finish="gold"><img src="warmler-swatch-gold.png" alt=""></button>
      <button class="finishOption" data-finish="brass"><img src="warmler-swatch-brass.png" alt=""></button>
      <button class="finishOption" data-finish="copper"><img src="warmler-swatch-copper.png" alt=""></button>
      <button class="finishOption" data-finish="aged-brass"><img src="warmler-swatch-aged-brass.png" alt=""></button>
      <button class="finishOption" data-finish="aged-copper"><img src="warmler-swatch-aged-copper.png" alt=""></button>
      <button class="finishOption" data-finish="diamond-plate"><img src="warmler-swatch-diamond-plate.png" alt=""></button>
    </div>
  </div>
</div>

<div id="stage">
  <div id="plateWrap">
    <canvas id="scene"></canvas>
    <div id="sheen"></div>
    <img id="plateOverlay" src="warmler-plate-silver.png" alt="">
  </div>
</div>

<div id="dock">
  <button id="finishTrigger" title="">
    <img id="finishTriggerImg" src="warmler-swatch-silver.png" alt="">
  </button>
  <div id="dockDivider"></div>
  <button class="modeBtn active" data-mode="aurora" title="aurora" style="background:linear-gradient(135deg,#4fd6c8,#8a6fe0,#e0568a);"></button>
  <button class="modeBtn" data-mode="sunset" title="sunset" style="background:linear-gradient(135deg,#ffcf6b,#ff7a4d,#c23b6b);"></button>
  <button class="modeBtn" data-mode="ocean" title="ocean" style="background:linear-gradient(135deg,#7fe0e8,#3f8fd6,#1c3f8a);"></button>
  <button class="modeBtn" data-mode="ember" title="ember" style="background:linear-gradient(135deg,#3a1a10,#c2401f,#ffcf6b);"></button>
  <button class="modeBtn" data-mode="opal" title="opal" style="background:linear-gradient(135deg,#e8d8f0,#a8d8e8,#d8e8b8);"></button>
</div>

<script>
(function(){
  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');
  const plateWrap = document.getElementById('plateWrap');
  const plateOverlay = document.getElementById('plateOverlay');
  const sheen = document.getElementById('sheen');
  const modeBtns = document.querySelectorAll('.modeBtn');
  const finishTrigger = document.getElementById('finishTrigger');
  const finishTriggerImg = document.getElementById('finishTriggerImg');
  const finishOverlay = document.getElementById('finishOverlay');
  const finishOptions = document.querySelectorAll('.finishOption');

  // ---------- each finish's real oval, measured directly from its own
  // artwork (leftmost/rightmost/topmost/bottommost point of the actual
  // transparent hole), as a fraction of the plate image's own width/height.
  // The interactive area and the heat-render both use these exactly, so
  // switching finishes moves the touch area to match that finish's real
  // hole rather than a single borrowed shape. ----------
  const FINISH_GEOMETRY = {
    'diamond-plate': {cx:0.4954, cy:0.4987, rx:0.2543, ry:0.2891},
    'aged-brass':    {cx:0.4968, cy:0.5000, rx:0.2584, ry:0.2995},
    'brass':         {cx:0.4972, cy:0.5033, rx:0.2594, ry:0.2988},
    'gold':          {cx:0.4961, cy:0.5176, rx:0.2520, ry:0.2806},
    'silver':        {cx:0.4968, cy:0.5007, rx:0.2591, ry:0.3001},
    'copper':        {cx:0.4972, cy:0.4980, rx:0.2502, ry:0.2858},
    'aged-copper':   {cx:0.4964, cy:0.5052, rx:0.2618, ry:0.2982},
  };
  // plate image filenames don't all match the finish keys exactly
  // (some are compound with no hyphen), so this is explicit rather than
  // built from a template string
  const FINISH_TEXTURES = {
    'diamond-plate': 'warmler-plate-diamondplate.png',
    'aged-brass':    'warmler-plate-agedbrass.png',
    'brass':         'warmler-plate-brass.png',
    'gold':          'warmler-plate-gold.png',
    'silver':        'warmler-plate-silver.png',
    'copper':        'warmler-plate-copper.png',
    'aged-copper':   'warmler-plate-agedcopper.png',
  };
  let currentFinish = 'silver';

  // ---------- low-res heat grid, upscaled with smoothing for a soft,
  // fluid look — this is the actual "liquid" quality, achieved by
  // resolution rather than any blur filter ----------
  const GRID = 64;
  let heat = new Float32Array(GRID * GRID);       // 0..1, current warmth
  let ambient = 0;                                  // slow baseline warmth, like held in the hand

  const low = document.createElement('canvas');
  low.width = GRID; low.height = GRID;
  const lowCtx = low.getContext('2d');
  const imgData = lowCtx.createImageData(GRID, GRID);

  let W = 0, H = 0, DPR = 1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const rect = plateWrap.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    updateSheenClip();
  }
  window.addEventListener('resize', resize);

  // the current finish's oval, in actual on-screen canvas pixels
  function getOvalRect(){
    const g = FINISH_GEOMETRY[currentFinish];
    const ow = W * g.rx * 2, oh = H * g.ry * 2;
    const ox = W * g.cx - ow/2, oy = H * g.cy - oh/2;
    return {x: ox, y: oy, w: ow, h: oh, cx: W*g.cx, cy: H*g.cy, rx: W*g.rx, ry: H*g.ry};
  }

  function updateSheenClip(){
    const g = FINISH_GEOMETRY[currentFinish];
    sheen.style.clipPath = `ellipse(${(g.rx*100).toFixed(2)}% ${(g.ry*100).toFixed(2)}% at ${(g.cx*100).toFixed(2)}% ${(g.cy*100).toFixed(2)}%)`;
  }

  // ---------- five colour-response modes ----------
  // each maps a heat value (0..1) to an RGB colour. Genuinely different
  // palettes, not the same gradient recoloured — the way the point of
  // liquid crystal iridescence is that colour, not just brightness,
  // shifts with temperature.
  function lerp(a,b,t){ return a+(b-a)*t; }
  function mixRGB(c1,c2,t){
    return [lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t)];
  }
  function rampColor(stops, t){
    t = Math.max(0, Math.min(1, t));
    const n = stops.length - 1;
    const seg = t * n;
    const i = Math.min(n - 1, Math.floor(seg));
    const localT = seg - i;
    return mixRGB(stops[i], stops[i+1], localT);
  }
  const PALETTES = {
    aurora: [[10,14,28],[20,60,90],[40,150,150],[110,90,210],[220,90,150],[255,220,200]],
    sunset: [[15,10,30],[70,20,70],[190,50,80],[255,120,60],[255,200,90],[255,245,220]],
    ocean:  [[5,10,20],[10,40,70],[20,90,130],[50,160,190],[130,220,220],[230,255,250]],
    ember:  [[8,4,4],[40,10,8],[110,25,10],[190,70,15],[255,150,40],[255,235,180]],
    opal:   [[18,16,26],[70,60,100],[140,110,170],[190,180,220],[220,230,200],[255,250,240]],
  };
  let mode = 'aurora';

  modeBtns.forEach((btn) => {
    btn.addEventListener('click', () => {
      modeBtns.forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      mode = btn.dataset.mode;
    });
  });

  // ---------- finish picker: the plate's casing material, entirely
  // separate from the heat-colour palette above. Defaults to silver. ----------
  function applyFinish(key){
    currentFinish = key;
    plateOverlay.src = FINISH_TEXTURES[key];
    finishTriggerImg.src = `warmler-swatch-${key}.png`;
    finishOptions.forEach(o => o.classList.toggle('selected', o.dataset.finish === key));
    updateSheenClip();
  }
  applyFinish('silver');

  finishTrigger.addEventListener('click', () => finishOverlay.classList.add('open'));
  finishOverlay.addEventListener('click', (e) => {
    if (e.target === finishOverlay) finishOverlay.classList.remove('open');
  });
  finishOptions.forEach(opt => {
    opt.addEventListener('click', () => {
      applyFinish(opt.dataset.finish);
      finishOverlay.classList.remove('open');
    });
  });

  // ---------- touch: inject heat continuously while held, but only
  // when the touch actually lands within the current finish's real
  // oval — touching the metal frame shouldn't register at all ----------
  let pointerActive = false;
  let pointerGX = GRID/2, pointerGY = GRID/2;

  function pointToGrid(clientX, clientY){
    const rect = plateWrap.getBoundingClientRect();
    const oval = getOvalRect();
    const px = clientX - rect.left, py = clientY - rect.top;
    const nx = (px - oval.x) / oval.w;
    const ny = (py - oval.y) / oval.h;
    const insideEllipse = ((nx-0.5)*2)**2 + ((ny-0.5)*2)**2 <= 1;
    return { gx: nx*GRID, gy: ny*GRID, inside: insideEllipse };
  }
  plateWrap.addEventListener('pointerdown', (e) => {
    const p = pointToGrid(e.clientX, e.clientY);
    if (!p.inside) return;
    pointerActive = true;
    pointerGX = p.gx; pointerGY = p.gy;
  });
  window.addEventListener('pointermove', (e) => {
    if (!pointerActive) return;
    const p = pointToGrid(e.clientX, e.clientY);
    pointerGX = p.gx; pointerGY = p.gy;
  });
  window.addEventListener('pointerup', () => { pointerActive = false; });
  window.addEventListener('pointercancel', () => { pointerActive = false; });

  // ---------- simulation ----------
  const CENTER = GRID/2;
  const RADIUS = GRID/2 - 1;
  // precompute which cells are actually inside the disc, once
  const inDisc = new Uint8Array(GRID*GRID);
  for (let y=0; y<GRID; y++){
    for (let x=0; x<GRID; x++){
      const dx = x - CENTER + 0.5, dy = y - CENTER + 0.5;
      inDisc[y*GRID+x] = (dx*dx+dy*dy <= RADIUS*RADIUS) ? 1 : 0;
    }
  }

  function stepSim(dtMs){
    const dt = Math.min(dtMs, 50) / 16.67; // normalise to ~60fps steps, clamp huge gaps

    // slow ambient warmth, like the disc resting in a hand — caps out
    // well below the vivid touch-response range
    ambient = Math.min(0.22, ambient + 0.00006 * dt);

    // inject heat continuously at the contact point while held
    if (pointerActive) {
      const R = 5;
      for (let dy=-R; dy<=R; dy++){
        for (let dx=-R; dx<=R; dx++){
          const gx = Math.round(pointerGX)+dx, gy = Math.round(pointerGY)+dy;
          if (gx<0||gx>=GRID||gy<0||gy>=GRID) continue;
          if (!inDisc[gy*GRID+gx]) continue;
          const d = Math.sqrt(dx*dx+dy*dy);
          if (d>R) continue;
          const falloff = 1 - d/R;
          const idx = gy*GRID+gx;
          heat[idx] = Math.min(1, heat[idx] + falloff*0.10*dt);
        }
      }
    }

    // diffusion: each cell moves toward the average of its neighbours —
    // this is what makes warmth spread outward from the touch point in
    // a genuinely fluid-looking way rather than a hard-edged blob
    const next = new Float32Array(GRID*GRID);
    const k = 0.18 * dt;
    for (let y=0; y<GRID; y++){
      for (let x=0; x<GRID; x++){
        const idx = y*GRID+x;
        if (!inDisc[idx]) { next[idx] = 0; continue; }
        let sum = 0, count = 0;
        if (x>0 && inDisc[idx-1])       { sum += heat[idx-1]; count++; }
        if (x<GRID-1 && inDisc[idx+1])  { sum += heat[idx+1]; count++; }
        if (y>0 && inDisc[idx-GRID])    { sum += heat[idx-GRID]; count++; }
        if (y<GRID-1 && inDisc[idx+GRID]){ sum += heat[idx+GRID]; count++; }
        const avg = count ? sum/count : heat[idx];
        let v = heat[idx] + (avg - heat[idx]) * k;
        // cooling: decays toward the ambient baseline, not to zero —
        // the disc settles back to "warm from being held", not stone cold
        v += (ambient - v) * 0.006 * dt;
        next[idx] = Math.max(0, Math.min(1, v));
      }
    }
    heat = next;
  }

  function render(){
    const palette = PALETTES[mode];
    for (let i=0; i<GRID*GRID; i++){
      const px = i*4;
      if (!inDisc[i]) { imgData.data[px+3] = 0; continue; }
      const [r,g,b] = rampColor(palette, heat[i]);
      imgData.data[px]   = r;
      imgData.data[px+1] = g;
      imgData.data[px+2] = b;
      imgData.data[px+3] = 255;
    }
    lowCtx.putImageData(imgData, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.clearRect(0,0,W,H);
    // draw the low-res grid only into the current finish's real oval
    // sub-rect — the plate image on top crops the rest regardless, but
    // this keeps the glow itself correctly centred within the true hole
    const oval = getOvalRect();
    ctx.drawImage(low, 0, 0, GRID, GRID, oval.x, oval.y, oval.w, oval.h);
  }

  let lastT = performance.now();
  function loop(t){
    const dtMs = t - lastT;
    lastT = t;
    stepSim(dtMs);
    render();
    requestAnimationFrame(loop);
  }

  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
