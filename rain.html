<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>rain — sagne</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root{ --bg1:#0f1420; --bg2:#1c2433; --brass:#c9974e; --parchment:#f2e9d8; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ height:100%; margin:0; overflow:hidden;
    background: radial-gradient(ellipse at 50% 35%, var(--bg2) 0%, var(--bg1) 75%);
    font-family: Georgia, serif; color:var(--parchment); }
  #backlink{ position:fixed; top:18px; left:22px; z-index:50; color:var(--parchment); opacity:.5; text-decoration:none; font-size:14px; letter-spacing:.04em; text-shadow:0 1px 3px rgba(0,0,0,.85), 0 0 9px rgba(0,0,0,.55); transition:opacity .3s ease; }
  #backlink:hover{opacity:.9;}
  #stage{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  #paneWrap{ position:relative; width:min(70vw, 460px); height:min(88vw, 620px); max-height:64vh; border-radius:4px;
    box-shadow: 0 0 0 14px #3a2d1e, 0 0 0 16px rgba(0,0,0,0.4), 0 25px 70px rgba(0,0,0,0.6); overflow:hidden; }
  canvas{ width:100%; height:100%; display:block; filter:saturate(0.55) brightness(0.97); }
  #dock{ position:fixed; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:14px; padding:16px 18px 26px; background:linear-gradient(to top, rgba(10,13,20,.85), rgba(10,13,20,0)); z-index:40; }
  #tiltRow{ display:flex; align-items:center; gap:12px; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:180px; height:3px; border-radius:3px; background:rgba(242,233,216,.25); outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--brass); cursor:pointer; box-shadow:0 0 6px rgba(201,151,78,.6); }
</style>
</head>
<body>
<a id="backlink" href="index.html">← sagne</a>
<!-- bring-your-own-music: plays a file the visitor picks from their own device; nothing is uploaded -->
<style>
  #music{ position:fixed; left:18px; bottom:16px; z-index:60; display:flex; align-items:center; gap:9px; }
  #musicBtn{ width:34px; height:34px; border-radius:50%; border:1px solid rgba(242,233,216,.25); background:rgba(20,24,34,.55); color:#f2e9d8; font-size:15px; line-height:1; cursor:pointer; opacity:.55; transition:opacity .3s, color .3s, border-color .3s; -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); }
  #musicBtn:hover{ opacity:1; }
  #musicBtn.playing{ color:#f0d69a; border-color:rgba(201,151,78,.6); opacity:.9; }
  #musicName{ max-width:40vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12px; color:#f2e9d8; opacity:0; transition:opacity .3s; letter-spacing:.02em; cursor:pointer; }
  #music:hover #musicName{ opacity:.55; }
</style>
<div id="music" title="play your own music">
  <button id="musicBtn" aria-label="play your own music">♪</button>
  <span id="musicName"></span>
</div>
<input type="file" id="musicPick" accept="audio/*" multiple hidden>
<audio id="musicEl"></audio>
<script>
(function(){
  const pick=document.getElementById('musicPick'), el=document.getElementById('musicEl'),
        btn=document.getElementById('musicBtn'), name=document.getElementById('musicName');
  let list=[], idx=0;
  const label=f=> f ? f.name.replace(/\.[^.]+$/,'') : '';
  function load(i){ if(el.src) URL.revokeObjectURL(el.src); el.src=URL.createObjectURL(list[i]); name.textContent=label(list[i]); }
  function sync(){ btn.textContent = !el.src ? '♪' : (el.paused ? '▶' : '❚❚'); btn.classList.toggle('playing', !!el.src && !el.paused); }
  btn.addEventListener('click', ()=>{ if(!list.length){ pick.click(); return; } el.paused ? el.play() : el.pause(); });
  name.addEventListener('click', ()=> pick.click());
  pick.addEventListener('change', ()=>{ if(!pick.files.length) return; list=[...pick.files]; idx=0; el.loop=(list.length===1); load(0); el.play(); });
  el.addEventListener('ended', ()=>{ if(list.length>1){ idx=(idx+1)%list.length; load(idx); el.play(); } });
  el.addEventListener('play', sync); el.addEventListener('pause', sync); el.addEventListener('loadeddata', sync);
  sync();
})();
</script>
<div id="stage"><div id="paneWrap"><canvas id="scene"></canvas></div></div>
<div id="dock"><div id="tiltRow"><span title="tilt">📐</span><input type="range" id="tiltSlider" min="0" max="100" value="35"></div></div>
<script>
(function(){
  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');
  const paneWrap = document.getElementById('paneWrap');
  const tiltSlider = document.getElementById('tiltSlider');

  let W=0,H=0,DPR=1;
  const bgCanvas=document.createElement('canvas'), bgCtx=bgCanvas.getContext('2d');
  const mistCanvas=document.createElement('canvas'), mistCtx=mistCanvas.getContext('2d');
  const glassCanvas=document.createElement('canvas'), glassCtx=glassCanvas.getContext('2d'); // live surface: mist + clearing trails

  function paintGarden(c, blur){
    const g=c.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#383c38'); g.addColorStop(0.5,'#2e322e'); g.addColorStop(0.82,'#2b3028'); g.addColorStop(1,'#38501f'); // greenish only at the low edge
    c.fillStyle=g; c.fillRect(0,0,W,H);
    const blobs=[[0.2,0.24,0.28,'#4f574a'],[0.72,0.14,0.22,'#4b524c'],[0.5,0.5,0.35,'#434a3f'],
      [0.14,0.7,0.25,'#3a4037'],[0.86,0.66,0.3,'#454b40'],[0.4,0.9,0.24,'#40551f'],[0.78,0.92,0.2,'#3a4c22'],
      [0.63,0.4,0.13,'#5b6252'],[0.30,0.52,0.10,'#636a55'],[0.8,0.4,0.09,'#6b7059']];
    c.save(); c.filter='blur('+blur+'px)';
    blobs.forEach(([bx,by,br,col])=>{ c.beginPath(); c.ellipse(bx*W,by*H,br*W,br*H*0.8,0,0,Math.PI*2); c.fillStyle=col; c.fill(); });
    c.restore();
  }
  function buildScene(){
    bgCanvas.width=W; bgCanvas.height=H; mistCanvas.width=W; mistCanvas.height=H;
    paintGarden(bgCtx,13);                 // clearer garden — what a drop reveals
    bgCtx.fillStyle='rgba(202,202,198,0.16)'; bgCtx.fillRect(0,0,W,H);      // keep even the clear view muted/overcast
    paintGarden(mistCtx,24);               // hazier base
    mistCtx.fillStyle='rgba(199,199,195,0.42)'; mistCtx.fillRect(0,0,W,H);  // neutral condensation veil
    mistCtx.save(); mistCtx.globalAlpha=0.06;
    const n=Math.floor(W*H/1100);
    for(let i=0;i<n;i++){ mistCtx.fillStyle=(i&1)?'#ffffff':'#9fb0b4'; mistCtx.fillRect(Math.random()*W,Math.random()*H,1,1); }
    mistCtx.restore();
    glassCanvas.width=W; glassCanvas.height=H; glassCtx.clearRect(0,0,W,H); glassCtx.drawImage(mistCanvas,0,0);
  }
  // the glass surface itself: fog regrows over cleared tracks; moving drops
  // wipe the fog away behind them and shed the odd bead into the trail
  function updateGlass(dt){
    glassCtx.globalAlpha=Math.min(0.07,0.020*dt);        // re-fogging — trails heal a touch faster so they don't pile up
    glassCtx.drawImage(mistCanvas,0,0,W,H);
    glassCtx.globalAlpha=1;
    for(const d of drops){
      if(d.moving && d.vy>0.2){
        const w=d.r*0.72;
        glassCtx.save();
        glassCtx.beginPath();
        glassCtx.rect(d.x-w, Math.min(d.py,d.y), w*2, Math.abs(d.y-d.py)+0.6);   // continuous track from last position to now
        glassCtx.ellipse(d.x,d.y,w,w*1.05,0,0,Math.PI*2);                         // rounded head
        glassCtx.clip();
        glassCtx.drawImage(bgCanvas,0,0,W,H);          // reveal the clear garden along the track
        glassCtx.restore();
      }
    }
  }
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    const rect=paneWrap.getBoundingClientRect(); W=rect.width; H=rect.height;
    canvas.width=W*DPR; canvas.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
    buildScene();
  }
  window.addEventListener('resize',resize);
  let tilt=tiltSlider.value/100;
  tiltSlider.addEventListener('input',()=>{ tilt=tiltSlider.value/100; });

  let drops=[];
  function newDrop(x,y,r){ return {x,y,r,vy:0,moving:false,py:y}; }
  // a raindrop lands somewhere on the glass and sticks where it hits;
  // occasionally a fatter one lands that will run before long
  function spawnDrop(){ const big=Math.random()<0.10; drops.push(newDrop(Math.random()*W, Math.random()*H, big?3.2+Math.random()*2.0:1.5+Math.random()*1.6)); }
  for(let i=0;i<30;i++) drops.push(newDrop(Math.random()*W, Math.random()*H, 1.5+Math.random()*2.4));

  let spawnAccum=0;
  function stepDrops(dt){
    const g = 0.85*tilt + 0.02;                 // along-pane gravity from tilt
    spawnAccum+=dt;
    while(spawnAccum>0.30){ spawnAccum-=0.30; if(drops.length<105) spawnDrop(); }  // lighter drizzle — most drops sit
    for(const d of drops){
      const mass = d.r*d.r;
      const pull = g*mass;                       // gravity pull grows with size
      const pinStatic = 1.6*d.r;                 // surface tension pins by contact width — breaks free at a realistic (smaller) size
      if(!d.moving && pull>pinStatic) d.moving=true;   // only breaks free once heavy enough
      if(d.moving){
        const pinKinetic = 0.6*d.r;              // weaker grip once it's sliding (hysteresis)
        d.vy += ((pull-pinKinetic)/mass)*dt*2.4;
        d.vy *= 0.94;
        if(d.vy<0) d.vy=0;
        d.py=d.y; d.y += d.vy*dt;                 // remember where it was, for a continuous trail
        if(d.vy>0.4) d.r=Math.max(2.6, d.r-0.006*dt);   // sheds slowly — stays visible leading its own trail
        if(d.vy<0.06 && pull<=pinStatic){ d.moving=false; d.vy=0; }  // re-pins if it slows & is light
      } else {                                    // stalled — condensation slowly feeds it
        d.vy=0; d.py=d.y; if(d.r<11) d.r += (0.0026 + 0.0016*tilt)*dt;  // gentle condensation; runs mostly triggered by rain landing & merging
      }
    }
    // a moving drop swallows the beads it passes, growing and speeding on
    for(let i=0;i<drops.length;i++){ for(let j=drops.length-1;j>i;j--){ const a=drops[i],b=drops[j];
      if(Math.hypot(a.x-b.x,a.y-b.y) < (a.r+b.r)*0.95){ const R=Math.sqrt(a.r*a.r+b.r*b.r);   // merge as soon as they touch — no overlapping drops
        a.x=(a.x*a.r+b.x*b.r)/(a.r+b.r); a.y=Math.max(a.y,b.y);
        a.vy=(a.vy*a.r+b.vy*b.r)/(a.r+b.r); a.r=R; a.moving=a.moving||b.moving; drops.splice(j,1);} } }
    drops=drops.filter(d=>d.y-d.r<H+20);
  }

  function drawDrops(){
    ctx.drawImage(glassCanvas,0,0,W,H);
    for(const d of drops){
      const r=d.r;
      ctx.beginPath(); ctx.ellipse(d.x+r*0.16,d.y+r*0.42,r*0.95,r*1.05,0,0,Math.PI*2);
      ctx.fillStyle='rgba(8,14,10,0.30)'; ctx.fill();
      // lens: clip to drop, draw garden magnified + vertically flipped about the drop
      ctx.save();
      ctx.beginPath(); ctx.ellipse(d.x,d.y,r,r*1.05,0,0,Math.PI*2); ctx.clip();
      const mag=1.9;
      ctx.translate(d.x,d.y); ctx.scale(mag,-mag); ctx.translate(-d.x,-d.y);
      ctx.drawImage(bgCanvas,0,0,W,H);
      ctx.restore();
      // refraction rim darkening at the very edge
      ctx.save();
      ctx.beginPath(); ctx.ellipse(d.x,d.y,r,r*1.05,0,0,Math.PI*2); ctx.clip();
      const rim=ctx.createRadialGradient(d.x,d.y,r*0.5,d.x,d.y,r*1.05);
      rim.addColorStop(0,'rgba(0,0,0,0)'); rim.addColorStop(0.8,'rgba(0,0,0,0)'); rim.addColorStop(1,'rgba(12,22,16,0.55)');
      ctx.fillStyle=rim; ctx.fillRect(d.x-r-2,d.y-r*1.05-2,r*2+4,r*2.1+4);
      ctx.restore();
      // bright bead edge (light wraps the lower-right of the drop)
      ctx.beginPath(); ctx.ellipse(d.x,d.y,r*0.98,r*1.03,0,0.5,2.25); ctx.lineWidth=Math.max(0.6,r*0.11); ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.stroke();
      // specular highlight, top-left, consistent light
      const hx=d.x-r*0.34,hy=d.y-r*0.44;
      const hi=ctx.createRadialGradient(hx,hy,0,hx,hy,r*0.5);
      hi.addColorStop(0,'rgba(255,255,255,0.92)'); hi.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=hi; ctx.beginPath(); ctx.ellipse(hx,hy,r*0.42,r*0.34,0,0,Math.PI*2); ctx.fill();
    }
  }

  let lastT=performance.now();
  function loop(t){ const dt=Math.min(t-lastT,50)/16.67; lastT=t; stepDrops(dt); updateGlass(dt); drawDrops(); requestAnimationFrame(loop); }
  resize(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
