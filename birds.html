<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>birds — sagne</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root{ --bg1:#0f1420; --bg2:#1c2433; --brass:#c9974e; --parchment:#f2e9d8; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ height:100%; margin:0; overflow:hidden; background:#7fa8c9; font-family: Georgia, serif; color:var(--parchment); }
  #backlink{ position:fixed; top:18px; left:22px; z-index:50; color:var(--parchment); opacity:.6; text-decoration:none; font-size:14px; letter-spacing:.04em; text-shadow:0 1px 3px rgba(0,0,0,.5), 0 0 9px rgba(0,0,0,.3); transition:opacity .3s ease; }
  #backlink:hover{opacity:1;}
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  #dock{ position:fixed; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:16px;
    padding:14px 18px 24px; background:linear-gradient(to top, rgba(10,13,20,.35), rgba(10,13,20,0)); z-index:40; }
  .glyph{ font-size:15px; opacity:.85; text-shadow:0 1px 3px rgba(0,0,0,.4); display:inline-flex; align-items:center; color:var(--parchment); filter:drop-shadow(0 1px 2px rgba(0,0,0,.4)); }
  #sparrowRow{ display:flex; align-items:center; gap:10px; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:200px; height:3px; border-radius:3px; background:rgba(242,233,216,.4); outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--brass); cursor:pointer; box-shadow:0 0 6px rgba(0,0,0,.4); }
</style>
</head>
<body>
<a id="backlink" href="index.html">← sagne</a>
<canvas id="scene"></canvas>
<div id="dock">
  <div id="sparrowRow"><span class="glyph" aria-label="sparrows"><svg width="20" height="16" viewBox="0 0 20 16" fill="currentColor"><ellipse cx="10" cy="9" rx="6.4" ry="4.6"/><circle cx="15.5" cy="5.6" r="3.4"/><path d="M4.2 8 L-0.2 5.4 L-0.2 10.8 Z" transform="translate(0.5,0)"/></svg></span><input type="range" id="sparrowSlider" min="0" max="18" value="6"></div>
</div>
<script>
(function(){
  const canvas=document.getElementById('scene'), ctx=canvas.getContext('2d');
  const sparrowSlider=document.getElementById('sparrowSlider');
  let W=0,H=0,DPR=1;

  // ---- background: a real photo (sunset sky + the two poles), used as-is — we only draw
  // the wire and birds on top of it. The pole tops were measured directly on the photo, in
  // its own native pixel space, then mapped through the same cover-fit transform used to
  // draw the image, so the wire's attach points track the actual poles at any window size.
  const bgImg=new Image(); bgImg.src='birds-background.png';
  const BG_W=1408, BG_H=768;
  // two wires, both strung on the same poles but attaching further down the timber — real
  // poles carry more than one crossarm. Offsets are down from the measured pole-top pixels.
  const POLE_IMG_SETS=[
    [{x:170,y:240+50},{x:1290,y:188+42}],    // upper wire
    [{x:170,y:240+100},{x:1290,y:188+85}],   // lower wire
  ];
  let bgScale=1, bgOX=0, bgOY=0;
  function fitBackground(){
    bgScale=Math.max(W/BG_W,H/BG_H);
    bgOX=(W-BG_W*bgScale)/2; bgOY=(H-BG_H*bgScale)/2;
  }
  function imgToScreen(p){ return {x:bgOX+p.x*bgScale, y:bgOY+p.y*bgScale}; }
  function drawBackground(){
    if(bgImg.complete && bgImg.naturalWidth) ctx.drawImage(bgImg,bgOX,bgOY,BG_W*bgScale,BG_H*bgScale);
    else { ctx.fillStyle='#e8935a'; ctx.fillRect(0,0,W,H); }   // plain fallback while it loads
  }

  // ---- wires: each one a chain of sample points strung between the two poles in the photo,
  // spring-damped toward a target height that's its own catenary sag plus a localized dip
  // under each bird currently sitting on THAT wire — landing/departure naturally produces a
  // dip-and-settle or a spring-back-and-oscillate, since it's just this spring chasing a
  // moving target. Two wires, same poles, independent of each other.
  const WIRE_N=48;
  let wires=[];
  function layout(){
    fitBackground();
    wires=POLE_IMG_SETS.map(([pi0,pi1])=>{
      const p0=imgToScreen(pi0), p1=imgToScreen(pi1);
      const w={poleX0:p0.x, poleY0:p0.y, poleX1:p1.x, poleY1:p1.y, pts:[]};
      for(let i=0;i<WIRE_N;i++){ const t=i/(WIRE_N-1);
        w.pts.push({t, x:w.poleX0+(w.poleX1-w.poleX0)*t, y:w.poleY0+(w.poleY1-w.poleY0)*t, vy:0}); }
      return w;
    });
  }
  // Each wire's shape comes from ONE physical process — a distributed load (the wire's own
  // constant self-weight, plus extra weight wherever a bird sitting on THAT wire is), integrated
  // twice to get a deflection curve. This is the actual math for how a loaded cable hangs. It's
  // the reason a real wire never looks like two different kinds of bend stitched together: the
  // gentle sag between birds and the deeper sag under them are the same curve family, just
  // reading different amounts of load — not a separate hand-shaped "dip" added on top of a
  // separate hand-shaped "sag".
  const BASE_LOAD=1;       // the wire's own weight, per unit length
  const BIRD_LOAD=8;       // how much heavier a bird makes the wire feel at its own position
  const DIP_SIGMA=70;      // how far a bird's weight is felt along the wire from where it sits
  const SAG_K=0.011;       // overall sag strength — tuned by eye against the unloaded droop
  function wireShape(w, wireIdx){
    const n=w.pts.length, load=new Array(n);
    for(let i=0;i<n;i++){ const x=w.pts[i].x; let l=BASE_LOAD;
      for(const b of sparrows){ if(b.wireIdx===wireIdx && (b.state==='perched'||b.state==='landing'||b.state==='shuffling'||b.state==='flapping')){
        const d=x-b.x; l += BIRD_LOAD*Math.exp(-(d*d)/(2*DIP_SIGMA*DIP_SIGMA)); } }
      load[i]=l; }
    const s=new Array(n); s[0]=0; for(let i=1;i<n;i++) s[i]=s[i-1]+load[i];    // first integral
    const c=new Array(n); c[0]=0; for(let i=1;i<n;i++) c[i]=c[i-1]+s[i];      // second integral
    const cEnd=c[n-1], target=new Array(n);
    for(let i=0;i<n;i++){ const t=w.pts[i].t;
      target[i]=w.poleY0+(w.poleY1-w.poleY0)*t + SAG_K*(cEnd*t-c[i]); }       // pin both ends back to the poles, sagging down
    return target;
  }
  function stepWire(dt){
    const k=90, damp=8.5;
    wires.forEach((w,wireIdx)=>{
      const target=wireShape(w,wireIdx);
      for(let i=0;i<w.pts.length;i++){ const p=w.pts[i], ty=target[i];
        const acc=(ty-p.y)*k - p.vy*damp;
        p.vy+=acc*dt; p.y+=p.vy*dt; }
    });
  }
  function wireYAt(wireIdx, x){
    const w=wires[wireIdx], t=Math.max(0,Math.min(1,(x-w.poleX0)/(w.poleX1-w.poleX0)));
    const i=Math.min(WIRE_N-2, Math.floor(t*(WIRE_N-1)));
    const p0=w.pts[i], p1=w.pts[i+1], lt=(t*(WIRE_N-1))-i;
    return p0.y+(p1.y-p0.y)*lt;
  }

  function drawWires(){
    ctx.strokeStyle='rgba(30,24,18,0.75)'; ctx.lineWidth=2; ctx.lineCap='round';
    for(const w of wires){
      ctx.beginPath(); ctx.moveTo(w.pts[0].x,w.pts[0].y);
      for(let i=1;i<w.pts.length;i++) ctx.lineTo(w.pts[i].x,w.pts[i].y);
      ctx.stroke();
    }
  }

  // ---- sparrow sprites: real reference photos (silhouettes on white), not drawn shapes.
  // Each one is loaded with its own anchor point — the pixel, in the ORIGINAL uncropped
  // photo, that should land exactly on the bird's simulated (x,y). For the 8-frame flight
  // loop and the approach pose, that anchor is the same fixed point (roughly the neck) in
  // every frame, measured once against the uncropped source — so cycling through frames
  // never makes the body jump around even though the wing silhouette changes size a lot.
  // For the perched/touchdown poses the anchor is where the reference wire crosses the
  // photo, so the feet land exactly on our own wire regardless of window size.
  // White backgrounds render as pure silhouettes via 'multiply' blending (draw() below) —
  // white multiplies to no-op, black multiplies to black, no cutout/alpha-matte needed.
  function sprite(file,w,h,ax,ay,nativeFacing){
    const img=new Image(); img.src='bird-sprites/'+file;
    return {img,w,h,ax,ay,nativeFacing:nativeFacing||-1};
  }
  const FLY_FRAMES=[
    sprite('bird-fly-1.png',424,396,8,282),
    sprite('bird-fly-2.png',426,196,10,45),
    sprite('bird-fly-3.png',502,269,80,45),
    sprite('bird-fly-4.png',429,266,7,45),
    sprite('bird-fly-5.png',433,311,7,206),
    sprite('bird-fly-6.png',433,367,7,261),
    sprite('bird-fly-7.png',466,359,40,253),
    sprite('bird-fly-8.png',424,396,8,282),
  ];
  const LAND_APPROACH=sprite('bird-land-approach.png',463,456,19,257);
  const TOUCHDOWN=sprite('bird-touchdown.png',410,397,205,369);
  const PERCH_VARIANTS=[
    sprite('bird-perch.png',515,307,257.5,279,-1),
    sprite('bird-perch-alt.png',593,365,296.5,343,1),
    sprite('bird-perch-back.png',241,431,120.5,346,-1),
  ];
  // a real hop-shuffle, not a slide: crouch (anticipate) -> launch (a quick, brief hop,
  // held for less time than the others so it reads as fast) -> settle (impact)
  const SHUFFLE_CROUCH=sprite('bird-shuffle-crouch.png',534,239,219,199);
  const SHUFFLE_LAUNCH=sprite('bird-shuffle-launch.png',438,432,255,290);
  const SHUFFLE_SETTLE=sprite('bird-shuffle-settle.png',444,284,147,240);
  const SHUFFLE_CROUCH_END=0.30, SHUFFLE_LAUNCH_END=0.45;   // fractions of the shuffle's total duration
  const BIRD_SCALE=0.09;    // sprite pixels -> screen pixels, tuned by eye
  const SPRITE_FLAP_HZ=4.2; // full 8-frame flap cycles per second

  // draws any of the sprites above at (x,y), silhouette-only via multiply blending, flipped
  // to match the bird's actual facing against however that sprite was originally drawn
  function drawSprite(sp, x, y, facing){
    if(!sp.img.complete || !sp.img.naturalWidth) return;
    const flip = facing===sp.nativeFacing ? 1 : -1;
    ctx.save();
    ctx.translate(x,y); ctx.scale(flip,1);
    ctx.globalCompositeOperation='multiply';
    ctx.drawImage(sp.img, -sp.ax*BIRD_SCALE, -sp.ay*BIRD_SCALE, sp.w*BIRD_SCALE, sp.h*BIRD_SCALE);
    ctx.restore();
  }

  // ---- sparrows ----
  let sparrows=[], idc=0;
  const PSR=34;           // personal-space radius — closer than this and a perched neighbour
                           // reacts (shuffles or flaps); this is a comfort threshold, not a
                           // collision one
  const MIN_SEP=22;        // the only hard rule: two birds may never actually overlap. Smaller
                           // than PSR on purpose — a new arrival can land inside another bird's
                           // personal space (triggering its shuffle reaction) without the two
                           // ever visually overlapping
  function flyFrame(wingPhase){
    const n=FLY_FRAMES.length, idx=Math.floor((wingPhase/(2*Math.PI))*n)%n;
    return FLY_FRAMES[(idx+n)%n];
  }
  // a spot is only free if it's clear of every other bird on that wire — including ones
  // still mid-flight toward their own landing spot, not just ones already perched, so two
  // birds never converge on the same stretch of wire at once
  function spotFree(wireIdx, x){
    return !sparrows.some(b=>{
      if(b.wireIdx!==wireIdx || b.state==='departing') return false;
      const bx=(b.state==='arriving'||b.state==='landing') ? b.targetX : b.x;
      return Math.abs(bx-x)<MIN_SEP;
    });
  }
  function pickLanding(){
    // prefer landing near an existing sparrow (on whichever wire it's on), otherwise pick
    // a wire at random and land near its centre — but only ever at a spot that's actually
    // clear, searching outward if the first guess is already taken. Landing inside another
    // bird's PSR (but outside MIN_SEP) is fine and expected — that's what triggers a shuffle.
    const settled=sparrows.filter(b=>b.state!=='departing');
    for(let attempt=0; attempt<16 && settled.length; attempt++){
      const anchor=settled[Math.floor(Math.random()*settled.length)];
      const w=wires[anchor.wireIdx];
      const side=Math.random()<0.5?-1:1;
      const x=Math.max(w.poleX0+30,Math.min(w.poleX1-30, anchor.x+side*(MIN_SEP+Math.random()*PSR*0.9)));
      if(spotFree(anchor.wireIdx,x)) return {wireIdx:anchor.wireIdx, x};
    }
    for(let attempt=0; attempt<24; attempt++){
      const wireIdx=Math.floor(Math.random()*wires.length), w=wires[wireIdx];
      const x=w.poleX0+30+Math.random()*(w.poleX1-w.poleX0-60);
      if(spotFree(wireIdx,x)) return {wireIdx,x};
    }
    // wires are genuinely packed — just take the roomiest spot available on either one
    let best=null, bestGap=-1;
    for(let wireIdx=0; wireIdx<wires.length; wireIdx++){ const w=wires[wireIdx];
      for(let x=w.poleX0+30; x<=w.poleX1-30; x+=10){
        let gap=Infinity;
        for(const b of sparrows){ if(b.wireIdx===wireIdx && b.state!=='departing'){
          const bx=(b.state==='arriving'||b.state==='landing')?b.targetX:b.x;
          gap=Math.min(gap,Math.abs(bx-x)); } }
        if(gap>bestGap){ bestGap=gap; best={wireIdx,x}; }
      }
    }
    return best || {wireIdx:0, x:(wires[0].poleX0+wires[0].poleX1)/2};
  }
  function spawnSparrow(){
    const fromLeft=Math.random()<0.5;
    const {wireIdx,x:targetX}=pickLanding();
    const b={id:idc++, state:'arriving', x: fromLeft?-40:W+40, y:H*0.25+Math.random()*60,
      targetX, wireIdx, facing: fromLeft?1:-1, wingPhase:Math.random()*7, t:0, shuffleFrom:0, shuffleTo:0, shuffleT:0,
      perchVariant:Math.floor(Math.random()*PERCH_VARIANTS.length)};
    sparrows.push(b);
  }
  function removeSparrow(){
    const alive=sparrows.filter(b=>b.state!=='departing'&&b.state!=='arriving');
    if(!alive.length) return;
    const b=alive[Math.floor(Math.random()*alive.length)];
    b.state='departing'; b.t=0; b.facing=Math.random()<0.5?-1:1;
  }

  // when a bird lands near others, give crowded neighbours a chance to shuffle away, or
  // flap in place if there's nowhere to go — only ever affects birds on the same wire
  function settleCrowding(wireIdx, landedX){
    const w=wires[wireIdx];
    for(const n of sparrows){
      if(n.state!=='perched' || n.wireIdx!==wireIdx) continue;
      const d=n.x-landedX;
      if(Math.abs(d)<PSR){
        const dir=d>=0?1:-1;
        const roomTo=n.x+dir*PSR*1.15;
        const blocked = sparrows.some(o=>o!==n && o.wireIdx===wireIdx && (o.state==='perched'||o.state==='shuffling') && Math.abs(o.x-roomTo)<PSR*0.55)
          || roomTo<w.poleX0+30 || roomTo>w.poleX1-30;
        if(!blocked){ n.state='shuffling'; n.shuffleFrom=n.x; n.shuffleTo=roomTo; n.shuffleT=0; n.facing=dir; }
        else { n.state='flapping'; n.t=0; }
      }
    }
  }

  function updateSparrows(dt){
    for(const b of sparrows){
      b.t+=dt; b.wingPhase+=dt*SPRITE_FLAP_HZ*2*Math.PI;
      if(b.state==='arriving'){
        const landY=wireYAt(b.wireIdx,b.targetX)-8;
        const dx=b.targetX-b.x, dy=landY-b.y, dist=Math.hypot(dx,dy);
        const speed=220;
        if(dist<6){ b.state='landing'; b.t=0; b.x=b.targetX; b.y=landY; settleCrowding(b.wireIdx,b.targetX); }
        else { b.x+=dx/dist*speed*dt; b.y+=dy/dist*speed*dt; b.facing=dx>=0?1:-1; }
      } else if(b.state==='landing'){
        // reaching-down approach pose gives way to feet-just-touched once close enough to
        // the wire — the approach sprite has no wire reference of its own, so it's anchored
        // the same way flight frames are (a neck point, a little above true perch height)
        b.y = b.t<0.15 ? wireYAt(b.wireIdx,b.x)-8 : wireYAt(b.wireIdx,b.x);
        if(b.t>0.28) b.state='perched';
      } else if(b.state==='perched'){
        b.y=wireYAt(b.wireIdx,b.x);
      } else if(b.state==='shuffling'){
        // three real phases, not one smooth slide: crouch in place, a quick hop with a
        // little lift, then settle at the new spot — SHUFFLE_LAUNCH_END-SHUFFLE_CROUCH_END
        // is deliberately short so the hop itself reads as fast, per the reference sequence
        b.shuffleT+=dt/0.5;
        const s=Math.min(1,b.shuffleT);
        let posT;
        if(s<SHUFFLE_CROUCH_END) posT=0;
        else { const u=(s-SHUFFLE_CROUCH_END)/(1-SHUFFLE_CROUCH_END); posT=u<0.5?2*u*u:1-Math.pow(-2*u+2,2)/2; }
        b.x=b.shuffleFrom+(b.shuffleTo-b.shuffleFrom)*posT;
        const inHop = s>=SHUFFLE_CROUCH_END && s<SHUFFLE_LAUNCH_END;
        const lift = inHop ? Math.sin(((s-SHUFFLE_CROUCH_END)/(SHUFFLE_LAUNCH_END-SHUFFLE_CROUCH_END))*Math.PI)*14 : 0;
        b.y=wireYAt(b.wireIdx,b.x)-lift;
        if(s>=1) b.state='perched';
      } else if(b.state==='flapping'){
        b.y=wireYAt(b.wireIdx,b.x)-8-Math.abs(Math.sin(b.wingPhase*0.5))*2;
        if(b.t>0.45) b.state='perched';
      } else if(b.state==='departing'){
        b.y-=70*dt; b.x+=b.facing*160*dt;
      }
    }
    sparrows=sparrows.filter(b=> !(b.state==='departing' && (b.x<-60||b.x>W+60)));
  }

  // ---- drawing: real reference-photo sprites, picked by state ----
  function drawSparrow(b){
    if(b.state==='arriving'||b.state==='departing'||b.state==='flapping'){
      drawSprite(flyFrame(b.wingPhase), b.x, b.y, b.facing);
    } else if(b.state==='landing'){
      drawSprite(b.t<0.15 ? LAND_APPROACH : TOUCHDOWN, b.x, b.y, b.facing);
    } else if(b.state==='shuffling'){
      const s=b.shuffleT;
      const sp = s<SHUFFLE_CROUCH_END ? SHUFFLE_CROUCH : s<SHUFFLE_LAUNCH_END ? SHUFFLE_LAUNCH : SHUFFLE_SETTLE;
      drawSprite(sp, b.x, b.y, b.facing);
    } else {
      drawSprite(PERCH_VARIANTS[b.perchVariant], b.x, b.y, b.facing);
    }
  }

  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=window.innerWidth; H=window.innerHeight;
    canvas.width=W*DPR; canvas.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
    layout();
  }
  window.addEventListener('resize',resize);

  let wantCount=6;
  sparrowSlider.addEventListener('input',()=>{ wantCount=+sparrowSlider.value; });
  let spawnTimer=0;

  let last=performance.now();
  function tick(now){
    const dt=Math.min((now-last)/1000,0.05); last=now;
    const alive=sparrows.filter(b=>b.state!=='departing').length;
    spawnTimer-=dt;
    if(alive<wantCount && spawnTimer<=0){ spawnSparrow(); spawnTimer=0.35+Math.random()*0.5; }
    else if(alive>wantCount && spawnTimer<=0){ removeSparrow(); spawnTimer=0.3+Math.random()*0.4; }

    stepWire(dt);
    updateSparrows(dt);

    ctx.clearRect(0,0,W,H);
    drawBackground();
    drawWires();
    const order=[...sparrows].sort((a,b)=>a.y-b.y);
    for(const b of order) drawSparrow(b);

    requestAnimationFrame(tick);
  }
  resize(); requestAnimationFrame(tick);
})();
</script>
</body>
</html>
